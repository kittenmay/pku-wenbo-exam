"type": "名词解释", "number": 3, "text": "浮选法", "score": null, "status": "ok", "source_note": "", "tags": ["考古学"], "question_id": 29, "model": "qwen3.7-max", "full_answer": "一、北大答题范式（300-600字）\n【定义】浮选法是考古发掘中获取微小遗存（尤其是植物遗存）的重要科技考古方法。其基本原理是利用不同物质比重的差异，将考古遗址中采集的土样放入水中，使比重较轻的炭化植物遗存（如种子、果实、木炭等）浮于水面，而比重较重的遗物（如陶片、石器、骨骼等）沉入水底，从而实现对微小遗存的科学提取与分类收集。\n【例证】在二里头、良渚及众多新石器时代遗址的发掘中，浮选法被广泛应用。例如，通过浮选法在贾湖遗址和仰韶文化遗址中发现了大量炭化粟、黍及水稻遗存，为探讨中国北方旱作农业与南方稻作农业的起源、发展及传播路径提供了直接的实物证据；同时，浮选出的杂草种子也为复原古代先民的生存环境与生业模式提供了重要线索。\n【评价】浮选法的广泛应用是考古学向“透物见人”转变的重要标志。它极大地拓展了考古学获取信息的维度，使植物考古学得以确立，为研究古代农业起源、生业经济及人地关系提供了不可替代的数据支撑。但其局限性在于无法提取非炭化且已腐朽的植物遗存，需结合植硅体、淀粉粒分析等微体植物考古方法进行综合研究。", "keywords": "关键字：二、答题关键字速背\n关键字：比重差异、微小遗存、炭化植物、轻浮重沉、农业起源、生业模式、植物考古、科技考古", "short_answer": "三、150字速答\n浮选法是考古发掘中利用物质比重差异提取微小遗存的科技考古方法。通过将土样入水，使较轻的炭化植物遗存浮于水面，较重的陶石骨器沉入水底，从而实现分类收集。该方法在贾湖等遗址中广泛应用，发现了大量炭化农作物种子。它极大拓展了信息获取维度，推动了植物考古发展，为研究古代农业起源、生业经济与人地关系提供了核心证据。"}, {"id": 30, "year": 2018, "direction": "田野考古方向", "type": "名词解释", "number": 4, "text": "东胡林", "score": null, "status": "ok", "source_note": "", "tags": ["考古学"], "question_id": 30, "model": "deepseek-v4-pro", "full_answer": "用户的要求是：“你是北京大学文博专业的考研辅导专家。请为每道题生成三种答案。严格按格式输出。”\n\n题目是：“东胡林”\n\n我需要直接输出三个部分，不得省略任何部分，不得输出推理过程：\n\n一、北大答题范式（300-600字）\n【定义】\n【例证】\n【评价】", "keywords": "关键字：二、答题关键字速背\n关键字：关键词1、关键词2、关键词3...", "short_answer": "三、150字速答\n（150字左右流畅段落）\n\n只输出上述格式，不要任何额外说明。\n\n所以，我必须为“东胡林”这个题目，生成三种答案。但用户说“为每道题生成三种答案”，可能指的是对同一个题目生成三种不同风格的答案？不，从格式看，它指定了三个部分：北大答题范式、答题关键字速背、150字速答。这其实就是一种综合答案，包含三种形式。我作为辅导专家，需要输出这个格式。\n\n那么，“东胡林”是一个考古学遗址。东胡林遗址是华北地区新石器时代早期的重要遗址，位于北京市门头沟区，距今约1万年左右，属于新石器时代早期，发现了墓葬、灰坑等，出土了石磨盘、石磨棒、陶器等，还有早期栽培粟的证据，以及人类的骨骼，如“东胡林人”。\n\n我需要按照北大答题范式来写。北大文博专业的答题风格可能注重定义、例证和评价。定义：东胡林遗址是什么。例证：具体遗迹、遗物。评价：学术意义。\n\n一、北大答题范式（300-600字）：需要在这个字数范围内，写出【定义】、【例证】、【评价】三部分。"}, {"id": 30, "year": 2018, "direction": "田野考古方向", "type": "名词解释", "number": 4, "text": "东胡林", "score": null, "status": "ok", "source_note": "", "tags": ["考古学"], "question_id": 30, "model": "gemini-3.5-flash", "full_answer": "[API_ERROR] HTTPError: HTTP Error 429: Too Many Requests", "keywords": "", "short_answer": ""}, {"id": 30, "year": 2018, "direction": "田野考古方向", "type": "名词解释", "number": 4, "text": "东胡林", "score": null, "status": "ok", "source_note": "", "tags": ["考古学"], "question_id": 30, "model": "qwen3.7-max", "full_answer": "一、北大答题范式（300-600字）\n【定义】东胡林遗址位于北京市门头沟区，是一处距今约10000至9000年的新石器时代早期遗址，属于新旧石器时代过渡阶段的重要遗存，以发现“东胡林人”墓葬及早期农业、陶器遗存而著称。\n【例证】遗址出土了著名的“东胡林少女”墓葬，随葬螺壳项链和骨镯，反映了早期审美与埋葬习俗。生产工具呈现打制与磨制石器共存的特点，并出土了早期夹砂红陶片。更重要的是，浮选发现了粟和黍的植硅体及碳化种子，以及丰富的动植物遗存，展示了狩猎采集与早期农业并存的经济形态。\n【评价】东胡林遗址是探索华北地区新旧石器时代过渡、早期陶器制作及旱作农业起源的关键遗址。它填补了北京地区新石器时代早期文化的空白，为研究当时人类的体质演化、生业模式及精神世界提供了珍贵资料，在中国史前考古学中具有重要地位。", "keywords": "关键字：二、答题关键字速背\n关键字：北京门头沟、新石器时代早期、新旧石器过渡、东胡林人墓葬、螺壳项链、打制与磨制石器共存、早期陶器、粟黍遗存、旱作农业起源", "short_answer": "三、150字速答\n东胡林遗址位于北京门头沟，是距今约一万年的新石器时代早期遗址。遗址出土了著名的“东胡林人”墓葬及随葬的螺壳项链，反映了早期埋葬习俗与审美。此外，打制与磨制石器共存、早期陶片的发现，以及粟、黍等农作物遗存的出土，为研究华北地区新旧石器时代过渡、陶器起源及北方旱作农业起源提供了极为关键的实物证据。"}, {"id": 31, "year": 2018, "direction": "田野考古方向", "type": "名词解释", "number": 5, "text": "考古地层学", "score": null, "status": "ok", "source_note": "", "tags": ["考古学"], "question_id": 31, "model": "deepseek-v4-pro", "full_answer": "一、北大答题范式（300-600字）\n【定义】考古地层学是考古学中用于判断遗迹、遗物相对年代和堆积过程的核心方法论，其基本原理源于地质学中的地层层序律。它以土质、土色、包含物及堆积结构为依据，将遗址堆积区分为不同的地层单位，并通过厘清各单位之间的叠压、打破、共存和界面等关系，建立起遗址的层位序列，从而为遗存的共时性与历时性分析提供时空框架。地层单位可以是自然形成的堆积层，也可以是人工建造的遗迹如房址、墓葬、灰坑等，每个单位均被视为一个封闭或半封闭的时空实体。\n【例证】以中原地区一处典型的多层聚落遗址为例。发掘中自上而下揭示：第①层为现代耕土层，土质疏松，含近现代瓷片；第②层为明清文化层，黄褐色土，夹有青花瓷片；第②层下见一座开口于该层底部的宋代砖室墓（M1），此墓打破第③层及生土；第③层为唐代文化层，浅灰色土，出土唐三彩与开元通宝；第③层下又压着一处仰韶时期的房基（F1）。据此层位关系可判定：F1年代最早，第③层次之，M1晚于第③层且不早于宋代，第②层年代最晚。此案例综合显示了叠压关系（②→③→F1）与打破关系（M1→③），明确了各个堆积单元的相对年代顺序。\n【评价】考古地层学是田野考古操作和室内整理研究的基石，与类型学并称为考古学的“两个车轮”。其长处在于能够通过严密的层位逻辑建立起遗址的微观年代序列，将器物、遗迹还原到原生的堆积语境中，为探讨文化变迁、聚落演替提供可靠依据。然而，地层学仅能指示相对早晚，无法给出绝对年代；“倒装地层”或后期扰动会破坏层位，造成判断困难；此外，过于机械地依赖“等高线式”分层，可能割裂同一活动面的关联性。因此，地层学须与土壤微形态分析、绝对测年技术及人类活动面（living floor）理念相结合，方能在复原古代行为过程中发挥最大效用。", "keywords": "关键字：二、答题关键字速背\n关键字：叠压原理、打破关系、地层单位、土质土色、相对年代、共时性、活动面、层位序列、界面识别、倒装地层", "short_answer": "三、150字速答\n考古地层学是依据土质、土色和包含物区分地层单位，通过叠压、打破等关系判定遗存相对年代的方法。其核心为地层层序律：下部堆积早于上部堆积，打破单位晚于被打破单位。实践中将遗址划分为自然层与文化层，厘清其时空序列，为类型学比较构建基础。它虽只能定相对早晚，易受后期扰动影响，但仍是提取遗存原生信息、重建聚落变迁过程不可替代的第一手段。"}, {"id": 31, "year": 2018, "direction": "田野考古方向", "type": "名词解释", "number": 5, "text": "考古地层学", "score": null, "status": "ok", "source_note": "", "tags": ["考古学"], "question_id": 31, "model": "gemini-3.5-flash", "full_answer": "[API_ERROR] HTTPError: HTTP Error 429: Too Many Requests", "keywords": "", "short_answer": ""}, {"id": 31, "year": 2018, "direction": "田野考古方向", "type": "名词解释", "number": 5, "text": "考古地层学", "score": null, "status": "ok", "source_note": "", "tags": ["考古学"], "question_id": 31, "model": "qwen3.7-max", "full_answer": "一、北大答题范式（300-600字）\n【定义】考古地层学是借用地质学地层学原理，研究考古遗址中文化堆积的形成过程、先后顺序及相互关系的学科。其核心原理包括叠压关系和打破关系，即下层早于上层，打破者晚于被打破者。它是考古学中最基本、最重要的研究方法之一，为考古遗存的相对年代判定提供科学依据。\n【例证】在殷墟发掘中，考古学家通过地层学方法，明确了商代晚期文化堆积的叠压与打破关系，厘清了殷墟文化的分期序列。又如在半坡遗址发掘中，通过辨识灰坑、房址与自然地层的打破与叠压关系，成功复原了仰韶文化半坡类型的聚落演变过程，为建立中国新石器时代考古学文化序列奠定了基础。\n【评价】考古地层学是考古学研究的基石，确保了出土遗物空间位置与时间顺序的准确性，使考古学从单纯的古物收藏走向科学的历史研究。然而，地层学只能解决相对年代问题，且在实际操作中易受后期人类活动或自然力扰动的影响，需结合类型学及科技测年手段综合运用，方能得出更精确的结论。", "keywords": "关键字：二、答题关键字速背\n关键字：地质学原理、文化堆积、叠压关系、打破关系、相对年代、下层早于上层、打破者晚于被打破者、时空框架、考古学基石", "short_answer": "三、150字速答\n考古地层学是借用地质学原理研究遗址文化堆积形成过程与先后顺序的学科。其核心是叠压与打破关系，即下层早于上层、打破者晚于被打破者。它是判定遗存相对年代、建立考古学时空框架的基石。虽易受后期扰动影响且仅能测定相对年代，但结合类型学与科技测年，能为科学复原古代历史提供坚实依据。"}, {"id": 32, "year": 2018, "direction": "田野考古方向", "type": "名词解释", "number": 6, "text": "墙盘", "score": null, "status": "ok", "source_note": "", "tags": ["考古学"], "question_id": 32, "model": "deepseek-v4-pro", "full_answer": "一、北大答题范式（300-600字）\n【定义】\n墙盘，又称史墙盘，是1976年出土于陕西扶风庄白一号西周青铜器窖藏的重器，现藏于宝鸡周原博物馆。该盘为西周恭王时期标准器，通高16.2厘米，口径47.3厘米，腹深8.6厘米，双附耳，圈足，腹部饰垂冠回首凤鸟纹，造型庄重典雅，是西周中期青铜礼器的典型代表。盘内底铸有铭文18行284字，是建国以来发现的最长青铜器铭文之一，内容具有极高的史料价值。\n【例证】\n墙盘铭文前半部分颂扬文、武、成、康、昭、穆以及当世天子共七代周王的功业，系统地概括了西周前期主要史事，如文王“肇彻周邦”、武王“征四方”、昭王“伐楚荆”等，可与《史记·周本纪》互证。后半部分为微氏家族世代谱系与史墙自述，记录该家族自烈祖微史以来历经商末至西周恭王七代辅佐周室、世为史官的历程。铭文通篇使用四言句式与韵文，文辞古奥优美，书法为西周中期标准化大篆，结体均衡，线条圆浑，是金文书法由雄强向整饬过渡的典范。该盘不仅为西周王年断代、周初史实、官制家族研究提供了第一手文字证据，其出土地周原遗址亦佐证了微氏家族作为殷遗史官世居宗周畿内的特殊地位。\n【评价】\n墙盘以其铭文长、史实详、书法精而被称为“青铜史书”。从考古学视角看，它是庄白一号窖藏中确定年代标尺的关键器物，将窖藏共出的百余件器物串联为微氏家族连续七代的铜器群，为西周青铜器分期断代树立了科学框架。在古文字学上，其铭文是金文语言与文书体例研究的基准材料。更深层意义在于，它揭示了殷周变革后，部分殷商贵族凭借文化职能被吸纳进周人统治体系的历史现象，家族记忆与王朝叙事并置的铭文结构，反映了西周中期贵族身份重构与历史意识自觉，是研究西周社会流动、族群融合与早期史学形态的珍贵个案。", "keywords": "关键字：二、答题关键字速背\n关键字：墙盘、史墙盘、西周恭王、庄白一号窖藏、284字铭文、七代周王、微氏家族、青铜史书、殷遗史官、金文书法典范、四言韵文、周原遗址", "short_answer": "三、150字速答\n墙盘是1976年陕西扶风庄白一号西周窖藏出土的恭王时期青铜重器。内底铸有284字长篇铭文，前半部分歌颂文王至恭王七代周王功烈，后半部分记载微氏家族世代为周室史官的谱系。铭文史实可补证《史记》，书体为西周中期大篆典型。该盘为周原铜器群分期断代提供了关键标尺，被学界誉为“青铜史书”，是研究西周王朝史、家族制度与金文书法不可替代的一手材料。"}, {"id": 32, "year": 2018, "direction": "田野考古方向", "type": "名词解释", "number": 6, "text": "墙盘", "score": null, "status": "ok", "source_note": "", "tags": ["考古学"], "question_id": 32, "model": "gemini-3.5-flash", "full_answer": "[API_ERROR] HTTPError: HTTP Error 429: Too Many Requests", "keywords": "", "short_answer": ""}, {"id": 32, "year": 2018, "direction": "田野考古方向", "type": "名词解释", "number": 6, "text": "墙盘", "score": null, "status": "ok", "source_note": "", "tags": ["考古学"], "question_id": 32, "model": "qwen3.7-max", "full_answer": "一、北大答题范式（300-600字）\n【定义】墙盘，又称史墙盘，西周中期青铜礼器，1976年出土于陕西扶风庄白一号西周青铜器窖藏，现藏宝鸡青铜器博物院，系首批禁止出国（境）展览文物。器形为浅腹、双附耳、圈足，腹部饰垂冠分尾鸟纹，圈足饰窃曲纹。\n【例证】其核心价值在于盘内底铸有的284字长篇铭文。铭文分两部分：前半部颂扬西周文、武、成、康、昭、穆及共王七代周王的丰功伟绩；后半部记述作器者“史墙”所属微氏家族六代辅佐周王的事迹。铭文印证了《史记》等文献中西周诸王世系的记载，补充了微氏家族归周受封的细节。其字体端庄秀丽，笔画圆润，是西周中期金文书法的成熟代表作。\n【评价】墙盘是西周青铜器断代的标准器，其长篇铭文具有“证经补史”的重大史料价值，为研究西周政治制度、家族形态及金文演变提供了珍贵实物资料，在中国青铜文化史与古文字学史上地位极高。", "keywords": "关键字：二、答题关键字速背\n关键字：史墙盘、西周中期、扶风庄白窖藏、284字铭文、七代周王、微氏家族、证经补史、断代标准器、禁止出国展览", "short_answer": "三、150字速答\n墙盘又称史墙盘，西周中期青铜礼器，1976年出土于陕西扶风庄白窖藏。盘内底铸有284字铭文，前半部颂扬文王至共王七代周王功绩，后半部记述微氏家族六代事迹。它不仅是西周青铜器断代的标准器，其铭文更具“证经补史”的重大价值，印证了西周王系并补充了家族史料，且书法端庄圆润，是研究西周历史与金文的国宝级文物。"}, {"id": 33, "year": 2018, "direction": "田野考古方向", "type": "名词解释", "number": 7, "text": "遗迹", "score": null, "status": "ok", "source_note": "", "tags": ["考古学"], "question_id": 33, "model": "deepseek-v4-pro", "full_answer": "一、北大答题范式（300-600字）\n【定义】\n遗迹是考古学的基本概念，指古代人类活动遗留下来的、不可整体移动或一经移动便丧失其原有结构与功能意义的物质遗存。它与可移动的遗物相对，是构成考古学文化堆积的主体之一。遗迹通常依赖于土地或岩层存在，如房址、窑穴、灰坑、水井、道路、城墙、墓葬、祭祀坑等。其在田野考古中通过平面与剖面相结合的地层学方法予以揭露和记录，强调原位、原貌及遗迹单位之间的叠压打破关系。遗迹不仅是人类行为的静态残留，更是古代社会技术、组织与观念的时空固化形态。\n\n【例证】\n以新石器时代仰韶文化半坡遗址为例，遗址中揭露出大量房址、窖穴和墓葬等遗迹。半地穴式房址的柱洞与灶坑，反映了建筑技术与家庭生活单元；围绕居住区的壕沟遗迹，则体现了聚落防御与边界意识；氏族公共墓地的排列有序的土坑墓，为研究社会组织与埋葬习俗提供了直接证据。再如商代殷墟的王陵区，大型带墓道的“十”字形或“中”字形墓葬以及密密麻麻的人殉、人祭坑，是当时王权制度与宗教信仰的遗迹见证。\n\n【评价】\n遗迹作为考古学研究的基本对象，具有不可替代的学术价值。其不可移动性要求田野工作必须坚持科学性与系统性，最大程度抢救和提取信息。通过对遗迹的共时性与历时性分析，考古学得以重建聚落形态、社会结构和文化发展序列。同时，遗迹保护与展示也是文化遗产管理的核心议题，大遗址保护等理念的提出，正是基于对遗迹整体价值与脆弱性的深刻认知。因此，对遗迹的理解不应限于分类描述，更应进入行为过程的重建与人文意义的阐释。", "keywords": "关键字：二、答题关键字速背\n关键字：不可移动、考古遗存、地层单位、房址墓葬灰坑、聚落考古、叠压打破关系、原位性、文化堆积、田野发掘、社会复原", "short_answer": "三、150字速答\n遗迹是古代人类活动遗留的不可移动物质遗存，如房址、灰坑、墓葬、城墙等。它与遗物共同构成考古学文化，是田野发掘中依据地层学原理记录和分析的基本单位。遗迹的形态、结构与空间关系，直接反映古代社区布局、建筑技术、丧葬观念和社会组织。对遗迹的解读需结合类型学与多学科手段，在保护前提下系统提取信息，为复原历史图景提供核心依据。"}, {"id": 33, "year": 2018, "direction": "田野考古方向", "type": "名词解释", "number": 7, "text": "遗迹", "score": null, "status": "ok", "source_note": "", "tags": ["考古学"], "question_id": 33, "model": "gemini-3.5-flash", "full_answer": "[API_ERROR] HTTPError: HTTP Error 429: Too Many Requests", "keywords": "", "short_answer": ""}, {"id": 33, "year": 2018, "direction": "田野考古方向", "type": "名词解释", "number": 7, "text": "遗迹", "score": null, "status": "ok", "source_note": "", "tags": ["考古学"], "question_id": 33, "model": "qwen3.7-max", "full_answer": "一、北大答题范式（300-600字）\n【定义】遗迹是指古代人类在生产和生活活动中遗留下来的、不可移动的痕迹和设施。它是考古学研究的基本对象之一，与可移动的“遗物”共同构成考古学文化的重要物质载体。常见的遗迹包括房址、墓葬、灰坑、窑址、水井、壕沟、祭坛等。\n【例证】以仰韶文化半坡遗址为例，其发现的半地穴式房屋遗迹和环绕聚落的壕沟遗迹，生动展现了新石器时代先民的居住形态与聚落防御体系；又如良渚古城遗址的外围水利系统遗迹，证明了当时已具备大规模社会组织与工程营建能力。\n【评价】遗迹具有不可移动性和空间固定性，其蕴含的层位关系和平面布局是运用考古地层学和聚落考古学研究的基础。遗迹不仅能直观反映古代人类的生产力水平、生活方式和社会组织结构，还能通过与出土遗物的共存关系，为复原古代社会历史、探讨人地关系提供最为关键的时空框架和情境信息。保护遗迹的原真性与完整性是当前文化遗产保护的核心要务。", "keywords": "关键字：二、答题关键字速背\n关键字：不可移动、痕迹设施、房址墓葬、聚落形态、地层学、空间关系、复原社会、原真性保护", "short_answer": "三、150字速答\n遗迹是古代人类活动遗留的不可移动的痕迹与设施，如房址、墓葬、灰坑等。作为考古学核心研究对象，遗迹具有空间固定性，其层位与布局是地层学与聚落考古的基础。结合共存遗物，遗迹能直观反映先民的生活方式、社会组织与生产力水平，为复原古代社会提供关键时空框架，其原真性保护也是文博工作的重中之重。"}, {"id": 34, "year": 2018, "direction": "田野考古方向", "type": "名词解释", "number": 8, "text": "兴隆洼文化", "score": null, "status": "ok", "source_note": "", "tags": ["考古学"], "question_id": 34, "model": "deepseek-v4-pro", "full_answer": "一、北大答题范式（300-600字）\n【定义】\n兴隆洼文化是中国北方新石器时代中期的重要考古学文化，因首次发现于内蒙古敖汉旗兴隆洼遗址而得名，年代约为公元前6200—前5400年。其分布范围主要在西辽河流域、大凌河流域及燕山南北地区，是探索东北地区早期旱作农业及聚落形态的关键文化。兴隆洼文化以大型聚落、成排房址、玉器起源及原始龙形象著称，代表了这一区域社会复杂化的最初阶段。\n【例证】\n典型遗址如敖汉旗兴隆洼遗址，揭露有170余座半地穴式房址，成排分布，外围环绕壕沟，聚落规划性极强。房址面积多在20—80平方米之间，最大者达140平方米，可能为氏族活动中心。遗物方面，出土大量打制有肩石锄、磨制石斧和磨盘磨棒，表明耜耕农业已占一定比重，同时细石器仍大量存在，渔猎采集为重要补充。最具标志性的遗存是成批玉器，如兴隆洼遗址M117出土一对白玉玦，是目前我国最早的真玉器，玉器以装饰品为主，体现礼仪化发端。兴隆沟遗址还发现由石块和陶片堆塑的龙形图案，被学者视为后世龙文化的早期意象。陶器均为夹砂陶，纹饰以三段式分布的压印之字纹、网格纹为特色，器形以深腹筒形罐为主，火候不均，采用泥圈套接法成型。\n【评价】\n兴隆洼文化以其早熟的大型聚落、有规划的千平方米级村落，改写了中华文明起源的时间与空间格局。其最早的真玉器群将我国用玉传统上溯至八千年前，证明玉文化根植于东北。成排房址与壕沟的营建显示了较强的社会组织能力。然而，聚落间尚未出现明显等级分化，玉器多属个人装饰，尚未形成权力标识体系，社会性质仍属较平等的原始氏族阶段。兴隆洼文化上承小河西文化，下启赵宝沟文化，为红山文化的高度繁荣奠定了人口、技术和观念基础，在多元一体中华文明起源中具有源头性地位。", "keywords": "关键字：二、答题关键字速背\n关键字：西辽河流域、公元前6200—前5400年、大型壕沟聚落、成排半地穴式房址、最早真玉器（白玉玦）、龙形堆塑、夹砂之字纹筒形罐、耜耕农业与渔猎并存、文明起源源头", "short_answer": "三、150字速答\n兴隆洼文化是中国北方新石器时代中期文化，距今约8200—7400年，以内蒙古敖汉旗兴隆洼遗址命名，分布于西辽河流域。其大型聚落由百多座成排半地穴式房址和围壕构成，规划严整。出土最古老的真玉器如玉玦，标志着玉文化起源；另有早期龙形堆塑。陶器以夹砂之字纹筒形罐为主，经济形态为耜耕农业与渔猎互补。该文化体现了较高的社会组织力，是红山文化及中华玉文明的重要源头。"}, {"id": 34, "year": 2018, "direction": "田野考古方向", "type": "名词解释", "number": 8, "text": "兴隆洼文化", "score": null, "status": "ok", "source_note": "", "tags": ["考古学"], "question_id": 34, "model": "gemini-3.5-flash", "full_answer": "[API_ERROR] HTTPError: HTTP Error 429: Too Many Requests", "keywords": "", "short_answer": ""}, {"id": 34, "year": 2018, "direction": "田野考古方向", "type": "名词解释", "number": 8, "text": "兴隆洼文化", "score": null, "status": "ok", "source_note": "", "tags": ["考古学"], "question_id": 34, "model": "qwen3.7-max", "full_answer": "一、北大答题范式（300-600字）\n【定义】兴隆洼文化是中国北方地区新石器时代早期文化，距今约8200至7400年，因内蒙古敖汉旗兴隆洼遗址而得名。主要分布在西辽河、大凌河流域，是探索中国北方旱作农业起源和早期聚落发展的重要考古学文化。\n【例证】典型遗址有兴隆洼、白音长汗、查海等。聚落多呈环壕聚落形态，房址多为半地穴式且排列有序。石器以打制为主，磨制与细石器并存。陶器以夹砂褐陶为主，器表多饰交叉压印纹，典型器型为筒形罐。经济形态以狩猎采集为主，已出现粟、黍等旱作农业，并出土了中国最早的玉器（如玉玦）和骨笛。\n【评价】兴隆洼文化确立了辽西地区新石器时代早期的年代序列，其环壕聚落反映了早期社会组织的复杂化。出土的玉器和炭化粟黍为研究中国玉文化起源和北方旱作农业起源提供了关键实物证据，对探讨中华文明多元一体格局的形成具有不可替代的学术价值。", "keywords": "关键字：二、答题关键字速背\n关键字：新石器早期、西辽河流域、环壕聚落、半地穴房址、筒形罐、压印纹、玉器起源、旱作农业、中华文明探源", "short_answer": "三、150字速答\n兴隆洼文化是距今约8200至7400年的北方新石器时代早期文化，分布于西辽河流域。其聚落多为环壕聚落，房址为半地穴式且排列有序；陶器以饰压印纹的筒形罐为主；出土了中国最早的玉器和炭化粟黍。该文化为研究北方旱作农业起源、玉器起源及早期聚落形态提供了关键证据，在中华文明探源中地位重要。"}, {"id": 35, "year": 2018, "direction": "田野考古方向", "type": "名词解释", "number": 9, "text": "系统抽样", "score": null, "status": "ok", "source_note": "", "tags": ["考古学"], "question_id": 35, "model": "deepseek-v4-pro", "full_answer": "一、北大答题范式  \n【定义】  \n系统抽样，又称等距抽样或机械抽样，是将总体中的所有单位按某种顺序排列，在规定范围内随机抽取第一个样本，然后按照固定间隔依次选取后续样本的概率抽样方法。其核心在于“等距”，间隔K通常由总体规模N除以所需样本量n确定，即K=N/n。在文博领域，该方法常用于田野考古调查中的区域系统采样、遗址内遗物分布记录、博物馆藏品抽样检测或观众行为统计等场景，强调以规则间距确保样本在空间或逻辑上的均匀覆盖。  \n\n【例证】  \n以某新石器时代遗址地表陶片采集为例：考古队将10万平方米遗址划分为1米×1米的网格共10万个单位，计划采集500件样本，则间隔K=10万/500=200。随机起点为第37格，随后每200格采集一次，即第37、237、437……格，直至取满500个。该方法避免了主观挑选，使样本均匀分布于遗址各处，能较好反映陶片整体的器型、纹饰和年代分布，为后续类型学与聚落分析提供代表性数据。又如博物馆对库房内5000件青铜器进行腐蚀状况抽检，计划检50件，K=100，随机起点25，则抽取第25、125、225……号藏品，从而高效掌握全库保存状况。  \n\n【评价】  \n优势在于操作简便、效率高，能够自动实现样本的均匀分布，尤其适合总体排列无序或呈自然序列时，抽样误差常小于简单随机抽样；在考古调查中能保证空间覆盖的均衡性，避免人为偏倚。局限性在于若总体存在周期性波动或隐性顺序（如每隔固定距离恰好为灰坑区或空白区），易产生系统性偏差，导致样本代表性下降；此外，方差估计相对复杂，需谨慎处理。文博研究中需结合地层、遗存分布特征判断其适用性，必要时可与分层抽样等方法结合使用。", "keywords": "关键字：二、答题关键字速背  \n关键字：等距抽样、固定间隔、概率抽样、随机起点、均匀覆盖、周期性偏差、田野考古系统采样、博物馆藏品抽检、操作简便、误差控制", "short_answer": "三、150字速答  \n系统抽样即等距抽样，将总体顺序排列后随机确定首个样本，按固定间隔K（总体规模/样本量）等距抽取样本。在文博领域，常用于考古调查中的规则网格采样与博物馆藏品的均匀抽检，能高效实现样本的空间或序列均匀分布，避免主观选择。其操作简单、抽样误差较小，但需警惕总体内的周期性变动引发系统性偏差。合理应用时可为遗存分析、文物保护评估提供可靠的代表性数据。"}, {"id": 35, "year": 2018, "direction": "田野考古方向", "type": "名词解释", "number": 9, "text": "系统抽样", "score": null, "status": "ok", "source_note": "", "tags": ["考古学"], "question_id": 35, "model": "gemini-3.5-flash", "full_answer": "[API_ERROR] HTTPError: HTTP Error 429: Too Many Requests", "keywords": "", "short_answer": ""}, {"id": 35, "year": 2018, "direction": "田野考古方向", "type": "名词解释", "number": 9, "text": "系统抽样", "score": null, "status": "ok", "source_note": "", "tags": ["考古学"], "question_id": 35, "model": "qwen3.7-max", "full_answer": "一、北大答题范式（300-600字）\n【定义】系统抽样，又称等距抽样或机械抽样，是指将总体中的所有单位按一定顺序排列，在随机抽取第一个样本后，按照固定的间隔（抽样距离）依次抽取后续样本的一种概率抽样方法。在考古调查与发掘中，常用于区域遗址普查或探方布设。\n【例证】在聚落考古的区域系统调查中，若调查区域面积为100平方公里，研究者可将区域划分为1000个网格，确定抽样间距为10。随机抽取第3号网格作为起点后，依次抽取第13、23、33号等网格进行实地踏查。在遗址发掘中，按固定间距布设探方或探沟也属于系统抽样的典型应用。\n【评价】系统抽样的优点在于操作简便、样本分布均匀，能有效提高总体估计的精度，尤其适用于面积广阔且地形均质的考古调查区。但其局限性在于，若总体存在与抽样间隔相一致的周期性规律（如古代农田的周期性垄沟遗迹），则可能导致样本产生严重偏差。因此，在实际文博应用中，需结合遗迹分布特征，必要时与分层抽样结合使用。", "keywords": "关键字：二、答题关键字速背\n关键字：等距抽样、固定间隔、概率抽样、区域调查、探方布设、分布均匀、周期性偏差、分层结合", "short_answer": "三、150字速答\n系统抽样又称等距抽样，是将总体按顺序排列，随机确定起点后按固定间隔抽取样本的概率抽样法。在考古区域调查和探方布设中广泛应用。其优点是操作简便、样本分布均匀，能提高估计精度；缺点是若总体存在与抽样间隔一致的周期性规律，易产生偏差。实际应用中需结合遗迹特征，常与分层抽样结合以保障科学性。"}, {"id": 36, "year": 2018, "direction": "田野考古方向", "type": "名词解释", "number": 10, "text": "越窑", "score": null, "status": "ok", "source_note": "", "tags": ["考古学"], "question_id": 36, "model": "deepseek-v4-pro", "full_answer": "一、北大答题范式（300-600字）\n【定义】\n越窑是中国古代南方青瓷窑系的杰出代表，主要分布在今浙江上虞、慈溪、余姚一带，唐代属越州，故名。其烧造历史始于东汉，成熟于魏晋，鼎盛于晚唐五代，衰落于宋中期以后。越窑以烧造青瓷为主，胎质细腻，釉色以青中泛黄或青绿为典型，晚唐五代创烧的“秘色瓷”更是代表了当时青瓷烧造的最高水平，釉面温润如玉，色泽“千峰翠色”。越窑瓷器多为素面，以造型和釉色取胜，常见器形有碗、盘、壶、罐、墓志、粉盒等，部分精细器物有刻划花、印花装饰。作为中国古代陶瓷史上一座丰碑，越窑不仅满足了国内贵族与平民的广泛需求，更通过海上贸易远销东亚、东南亚及西亚、非洲东海岸，对世界陶瓷文化产生了深远影响。\n【例证】\n1987年陕西扶风法门寺唐代地宫出土的14件明文记载为“瓷秘色”的越窑青瓷，是秘色瓷的标准器，包括八棱净水瓶、花口碗、盘等，其釉色青绿如湖，器形规整，证实了晚唐诗人陆龟蒙“九秋风露越窑开，夺得千峰翠色来”的描述。此外，慈溪上林湖是唐宋越窑中心窑场，考古发现的龙窑长达数十米，窑具、残片堆积深厚，出土的晚唐五代秘色瓷残片釉色莹润，胎质细白，刻有“官”“贡”字样，表明其为贡瓷产地。北宋早期越窑继续烧造，例如浙江出土的刻花牡丹纹盖盒，线条流畅，证明其装饰技法转向精细刻划，并与北方青瓷形成互动。\n【评价】\n越窑在中国陶瓷史上具有承前启后的关键地位。它上承原始青瓷和汉六朝青瓷技术，下启宋龙泉窑及南方青瓷体系，其先进的龙窑结构与匣钵装烧工艺直接推动了青瓷质量的飞跃。秘色瓷的创烧标志着青瓷釉色美学从透明青釉转向乳浊厚釉的审美先行，成为中国古代瓷业“由瓷达玉”理想的里程碑。越窑不仅是唐代“南青北白”瓷业格局中南方青瓷的代表，更是早期中国瓷器对外输出的主要品种之一，在海上陶瓷之路中扮演了核心角色，深刻影响了高丽青瓷和日本古窑业的发展。其衰落也揭示了区域瓷业中心转移的历史规律，为理解中国瓷业经济地理变迁提供了经典案例。", "keywords": "关键字：二、答题关键字速背\n关键字：越州窑系、青瓷、东汉至宋、上林湖、秘色瓷、法门寺地宫、龙窑与匣钵、南青北白、海上陶瓷之路、千峰翠色", "short_answer": "三、150字速答\n越窑是唐代至五代南方青瓷名窑，窑址集中浙江上林湖等地，因唐代属越州得名。烧瓷始于东汉，鼎盛于晚唐五代，代表作为“秘色瓷”，法门寺地宫出土物为其标准器，釉色青绿似玉，印证“千峰翠色”之誉。越窑以素面造型与釉质取胜，是中国“南青北白”格局的南方支柱，通过海上贸易远销海外，其技术深刻影响后世青瓷体系及东亚制瓷业。"}, {"id": 36, "year": 2018, "direction": "田野考古方向", "type": "名词解释", "number": 10, "text": "越窑", "score": null, "status": "ok", "source_note": "", "tags": ["考古学"], "question_id": 36, "model": "gemini-3.5-flash", "full_answer": "[API_ERROR] HTTPError: HTTP Error 429: Too Many Requests", "keywords": "", "short_answer": ""}, {"id": 36, "year": 2018, "direction": "田野考古方向", "type": "名词解释", "number": 10, "text": "越窑", "score": null, "status": "ok", "source_note": "", "tags": ["考古学"], "question_id": 36, "model": "qwen3.7-max", "full_answer": "一、北大答题范式（300-600字）\n【定义】越窑是中国古代最著名的青瓷窑系之一，因核心窑址分布于古越州（今浙江慈溪、上虞、余姚等地）而得名。其创烧于东汉，历经三国两晋南北朝的发展，于唐、五代达到鼎盛，北宋中晚期逐渐衰落。越窑以烧造青瓷为主，胎质细腻坚致，釉色青翠莹润，代表了古代青瓷烧造的最高水平。\n【例证】唐代越窑青瓷以“秘色瓷”最为珍贵，陆龟蒙诗云“九秋风露越窑开，夺得千峰翠色来”。1987年陕西法门寺地宫出土的13件秘色瓷，证实了其为越窑专为皇室烧造的贡瓷。此外，五代吴越国时期越窑青瓷大量进献中原，并远销海外，在“黑石号”沉船及海上丝绸之路沿线遗址中均有大量越窑瓷器出土。\n【评价】越窑在中国陶瓷史上具有举足轻重的地位，不仅确立了青瓷的审美范式，其“秘色瓷”更代表了唐五代制瓷工艺的巅峰。越窑的制瓷技术对后世龙泉窑、耀州窑乃至高丽青瓷的发展产生了深远影响。同时，越窑青瓷作为早期外销瓷的主力，在促进中外文化交流与海上丝绸之路贸易中发挥了重要作用。", "keywords": "关键字：二、答题关键字速背\n关键字：古越州、青瓷窑系、东汉创烧、唐五代鼎盛、秘色瓷、千峰翠色、法门寺地宫、贡瓷、外销瓷、海上丝绸之路、技术外传", "short_answer": "三、150字速答\n越窑是中国古代著名青瓷窑系，因位于古越州而得名。创烧于东汉，唐五代达鼎盛，北宋衰落。其胎质细腻，釉色青翠，唐代烧制的“秘色瓷”代表青瓷最高水平，法门寺地宫出土实物印证了其贡瓷地位。越窑不仅确立了青瓷审美范式，对后世龙泉窑及高丽青瓷影响深远，更是海上丝绸之路的重要外销瓷，在中外文化交流中地位卓著。"}, {"id": 37, "year": 2018, "direction": "田野考古方向", "type": "名词解释", "number": 11, "text": "洹北商城", "score": null, "status": "ok", "source_note": "", "tags": ["考古学"], "question_id": 37, "model": "deepseek-v4-pro", "full_answer": "一、北大答题范式（300-600字）\n【定义】\n洹北商城是商代中期的一处大型都邑遗址，位于河南省安阳市洹河北岸，与殷墟遗址隔河相望。年代属中商文化白家庄期至花园庄期，绝对年代约公元前14世纪至前13世纪。遗址平面略呈方形，总面积约4.7平方公里，由宫城、内城和外郭城三重城垣构成，布局严谨，功能分区明确，宫城区位于城内中部偏北，分布有大型夯土基址群。该遗址的发现填补了郑州商城与安阳殷墟之间商代都邑链条的缺环，对研究中商时期的政治、经济与文化面貌具有关键意义。\n【例证】\n宫城区内发现数十处大型建筑基址，其中一号基址面积达1.6万平方米，是已知商代早期单体规模最大的宫室建筑，采用“四阿重屋”式结构，平面呈回字形，四周有廊庑和门塾，显示出成熟的宫殿营造制度。手工业作坊区分布于外城，包括铸铜、制骨、制陶等作坊，出土大量陶范、骨料及生产工具，表明当时已形成专业化、规模化的手工业生产体系。城墙基槽宽约9米，采用分块版筑技术，局部发现城门及道路遗迹。各类遗物中，陶器以典型中商风格的深腹盆、鬲、簋为主，青铜器兼具郑州期与殷墟期的过渡特征。\n【评价】\n洹北商城的考古发现，有力推动了商代考古编年体系的重构，使中商文化的分期与性质得以确认。其都城布局对探讨商代城市规划思想、礼仪制度及社会结构提供了珍贵资料。宫城的独立设置与宏大建筑群，反映出王权的强化和都城功能的复杂化，为研究商代文明从早期到晚期的嬗变提供了关键环节。同时，城内各类手工业遗存揭示了商代中期经济体系的高度组织化，表明洹北商城不仅是政治中心，也是技术传播与经济整合的重要枢纽。", "keywords": "关键字：二、答题关键字速背\n关键字：中商都邑、洹河北岸、宫城基址、四阿重屋、版筑城墙、手工业作坊、白家庄期、都邑缺环、宫殿规模、城市布局", "short_answer": "三、150字速答\n洹北商城是商代中期的都邑遗址，位于河南安阳洹河北岸，距今约3400年。城址面积达4.7平方公里，由宫城、内城、外城构成，宫城内发现大型夯土基址群，其中一号宫殿基址面积逾1.6万平方米，呈回字形布局，四面廊庑环绕，体现高超建筑水平。外城分布铸铜、制骨等手工业作坊，城墙采用版筑技术。该城填补了早商与晚商之间的都邑缺环，是认识中商文化面貌、都城制度演变的核心遗址。"}, {"id": 37, "year": 2018, "direction": "田野考古方向", "type": "名词解释", "number": 11, "text": "洹北商城", "score": null, "status": "ok", "source_note": "", "tags": ["考古学"], "question_id": 37, "model": "gemini-3.5-flash", "full_answer": "[API_ERROR] HTTPError: HTTP Error 429: Too Many Requests", "keywords": "", "short_answer": ""}, {"id": 37, "year": 2018, "direction": "田野考古方向", "type": "名词解释", "number": 11, "text": "洹北商城", "score": null, "status": "ok", "source_note": "", "tags": ["考古学"], "question_id": 37, "model": "qwen3.7-max", "full_answer": "一、北大答题范式（300-600字）\n【定义】洹北商城是商代中期的大型都城遗址，位于河南省安阳市洹水北岸、殷墟遗址东北部。其年代介于郑州商城与殷墟之间，填补了商代中期都城考古的空白，学界多认为其可能是商王盘庚迁殷的最初都城或河亶甲所居之“相”。\n【例证】遗址总面积约4.7平方公里，功能分区明确，发现有宫城、宫殿区、作坊区及墓葬区。宫城位于南部，发掘出一号、二号等大型夯土宫殿基址，规模宏大且布局严谨。出土遗物丰富，陶器以灰陶为主，常见鬲、盆、豆等，兼具早商与晚商特征；并发现铸铜、制骨等手工业作坊遗迹，展现了发达的官营手工业。\n【评价】洹北商城的发现极大丰富了商代中期的考古学文化面貌，完善了商代都城的发展序列。它不仅为探讨商代中期的城市布局、社会结构及手工业发展提供了珍贵实物资料，更为解决“盘庚迁殷”等重大学术问题提供了关键线索，在商代考古与历史研究中具有里程碑意义。", "keywords": "关键字：二、答题关键字速背\n关键字：商代中期、安阳洹北、殷墟东北、宫城遗址、夯土宫殿基址、填补空白、盘庚迁殷、都城序列", "short_answer": "三、150字速答\n洹北商城位于河南安阳洹水北岸，是介于早商郑州商城与晚商殷墟之间的商代中期大型都城遗址。遗址发现宫城、大型夯土宫殿基址及手工业作坊，出土大量商代中期典型陶铜器。其发现填补了商代中期都城考古空白，完善了商代都城发展序列，为探讨“盘庚迁殷”及商代社会演进提供了关键实物资料，具有里程碑意义。"}, {"id": 38, "year": 2018, "direction": "田野考古方向", "type": "名词解释", "number": 12, "text": "7庄白一号铜器窖藏", "score": null, "status": "ok", "source_note": "", "tags": ["考古学"], "question_id": 38, "model": "deepseek-v4-pro", "full_answer": "一、北大答题范式\n【定义】\n庄白一号铜器窖藏是1976年于陕西扶风周原遗址庄白村发现的西周晚期微氏家族青铜器窖藏。窖藏开口于汉代地层下，坑口呈长方形，器物分三层叠放，共出土青铜器103件，其中74件铸有铭文。该窖藏是周原遗址迄今出土器物数量最多、保存最完整、铭文资料最丰富的青铜器群之一，其主体器物为微氏家族世代制作的礼器，年代跨越西周早、中、晚期，为西周青铜器断代、家族形态及礼制研究提供了标尺性材料。\n\n【例证】\n窖藏核心重器“史墙盘”铭文284字，分前后两段，前半段颂扬文、武、成、康、昭、穆及时王（共王）的功业，后半段追述微氏家族自高祖甲微归周以来七代人的世系与职官，铭文所载王号、史实与文献互证，首次确证了西周诸王世系。同出之“三年兴壶”、“十三年兴壶”等器群组完整，铭文记有王对瘐的册命、赏赐及田邑变动，深度呈现了西周册命制度、土地制度及家族政治运作。另有“丰尊”、“墙爵”等，造型庄重，纹饰铸铭俱精，建立起从昭穆之际至宣幽时期的风格演变序列。\n\n【评价】\n该窖藏的发现具有里程碑意义。其一，它以成体系的“标准器群”构建起西周中晚期青铜器断代的可靠坐标，解决了此前众多器物年代模糊的问题。其二，微氏世系铭文的释读，开创了以考古材料微观透视贵族家族史的范式，将地下出土文献与传世典籍间的二重证据法推向深入。其三，窖藏本身作为特定历史事件的物质遗存，其埋藏背景为探讨西周末年犬戎入侵、贵族仓皇东逃的社会剧变提供了最直接的考古学证词，深刻揭示了青铜时代由盛而衰的历史剖面。", "keywords": "关键字：二、答题关键字速背\n关键字：周原遗址、微氏家族、103件青铜器、74件有铭文、史墙盘、284字铭文、西周诸王世系、七代世系、册命制度、标准器断代、二重证据法、西周末年社会变革", "short_answer": "三、150字速答\n庄白一号窖藏1976年发现于陕西扶风周原，是微氏家族103件西周青铜器的集中埋藏，74件有铭文。核心重器史墙盘铭284字，追颂西周诸王功业并详列本族七代世系，是印证和补充文献的珍贵“地下史书”。该窖藏器群时代序列完整，为西周青铜器断代确立了标尺，铭文深刻揭示了册命、土地制度及贵族家族形态，其埋藏性质更是西周末年社会动荡的直接反映，学术价值极高。"}, {"id": 38, "year": 2018, "direction": "田野考古方向", "type": "名词解释", "number": 12, "text": "7庄白一号铜器窖藏", "score": null, "status": "ok", "source_note": "", "tags": ["考古学"], "question_id": 38, "model": "gemini-3.5-flash", "full_answer": "[API_ERROR] HTTPError: HTTP Error 429: Too Many Requests", "keywords": "", "short_answer": ""}, {"id": 38, "year": 2018, "direction": "田野考古方向", "type": "名词解释", "number": 12, "text": "7庄白一号铜器窖藏", "score": null, "status": "ok", "source_note": "", "tags": ["考古学"], "question_id": 38, "model": "qwen3.7-max", "full_answer": "一、北大答题范式（300-600字）\n【定义】庄白一号铜器窖藏是指1976年发现于陕西扶风县庄白村的一处西周晚期青铜器窖藏。该窖藏出土青铜器103件，是新中国成立以来出土青铜器数量最多、学术价值最高的一处窖藏，主要为西周微氏家族的世代传承之物。\n【例证】窖藏出土的103件铜器中，有铭文者达74件。其中最具代表性的是史墙盘，其铭文长达284字，前半部分颂扬西周历代先王的丰功伟绩，后半部分记述微氏家族六代先祖的事迹。此外，折觥、三年兴壶等器物造型奇特、纹饰精美，为西周青铜器断代提供了标准器。\n【评价】庄白一号窖藏的发现，不仅极大地丰富了西周青铜器的实物资料，其丰富的铭文更是印证和补充了传世文献的不足。它为构建西周青铜器断代标尺、研究西周宗法制度、家族世系及西周中晚期历史提供了无可替代的第一手材料，在中国青铜时代考古学史上具有里程碑意义。", "keywords": "关键字：二、答题关键字速背\n关键字：陕西扶风、西周晚期、微氏家族、103件铜器、史墙盘、折觥、青铜器断代、家族世系", "short_answer": "三、150字速答\n庄白一号铜器窖藏位于陕西扶风庄白村，发现于1976年，是西周晚期微氏家族的青铜器窖藏。共出土铜器103件，74件有铭文。代表器物史墙盘铭文长达284字，详述西周先王功绩与微氏世系；折觥等造型精美。该窖藏为西周青铜器断代、宗法制度及历史研究提供了珍贵资料，具有里程碑意义。"}, {"id": 39, "year": 2018, "direction": "田野考古方向", "type": "名词解释", "number": 13, "text": "马王堆一号汉墓", "score": null, "status": "ok", "source_note": "", "tags": ["考古学"], "question_id": 39, "model": "deepseek-v4-pro", "full_answer": "一、北大答题范式（300-600字）\n【定义】\n马王堆一号汉墓是西汉初期长沙国丞相轪侯利苍的夫人辛追的墓葬，位于湖南省长沙市东郊，1972年发掘。该墓是马王堆汉墓群中保存最为完整、出土文物最为丰富的一座，为研究西汉初期贵族丧葬制度、社会生活、科技水平与艺术成就提供了极为珍贵的实物资料。墓葬为大型竖穴土坑木椁墓，由封土、墓道、墓坑和椁室组成，椁室采用厚重的柏木构筑，四周及顶部填塞木炭与白膏泥，形成高度密封的防腐环境，使墓主尸体及大量有机质文物历经两千余年仍完好保存。\n【例证】\n该墓出土文物逾千件，涵盖丝织品、漆器、简牍、帛画、乐器、食物、药材等。其中，素纱襌衣薄如蝉翼，重仅49克，反映了西汉纺织技术的巅峰；T形帛画描绘了天上、人间、地下三重世界，是早期中国绘画与丧葬信仰的重要标本；大量漆器制作精美，书有“轪侯家”铭文，印证了墓主身份；遣策竹简详细记录了随葬物品的种类与数量，为汉代名物制度研究提供了直接依据。此外，墓中出土的帛书《老子》《周易》及天文、医学佚籍，具有极高的文献价值。尤为世所罕见的是，辛追女尸出土时全身润泽，软组织尚有弹性，部分关节可活动，是世界上已发现的保存时间最长、状况最完好的湿尸。\n【评价】\n马王堆一号汉墓的发现，是中国乃至世界考古史上的重大突破。它完整呈现了西汉列侯级贵族的丧葬礼制，极大推进了汉代物质文化研究；湿尸与随葬品的奇迹般保存，推动了中国文物保护科学与古尸研究的发展；帛画、帛书与简牍的问世，补证了传世典籍，深刻影响了简帛学、美术史、纺织史等多个学科。该墓以其丰富的内涵和卓越的保存状态，成为汉代考古的标志性遗址，至今仍是多学科交叉研究的典范。", "keywords": "关键字：二、答题关键字速背\n关键字：辛追墓、竖穴土坑木椁、白膏泥防腐、湿尸、素纱襌衣、T形帛画、遣策、帛书、西汉长沙国、轪侯夫人", "short_answer": "三、150字速答\n马王堆一号汉墓是西汉长沙国丞相轪侯夫人辛追的墓葬，1972年发掘于长沙。为大型木椁墓，因白膏泥和木炭密封，保存极佳。出土了保存完好的湿尸、薄如蝉翼的素纱襌衣、描绘天地人三界的T形帛画以及大量漆器、丝织品、简牍帛书等千余件文物，全面呈现了西汉贵族生活与丧葬制度，是汉代考古里程碑式的发现。"}, {"id": 39, "year": 2018, "direction": "田野考古方向", "type": "名词解释", "number": 13, "text": "马王堆一号汉墓", "score": null, "status": "ok", "source_note": "", "tags": ["考古学"], "question_id": 39, "model": "gemini-3.5-flash", "full_answer": "[API_ERROR] HTTPError: HTTP Error 429: Too Many Requests", "keywords": "", "short_answer": ""}, {"id": 39, "year": 2018, "direction": "田野考古方向", "type": "名词解释", "number": 13, "text": "马王堆一号汉墓", "score": null, "status": "ok", "source_note": "", "tags": ["考古学"], "question_id": 39, "model": "qwen3.7-max", "full_answer": "一、北大答题范式（300-600字）\n【定义】马王堆一号汉墓位于湖南省长沙市，是西汉初期长沙国丞相、轪侯利苍之妻辛追的墓葬。该墓于1972年发掘，是马王堆汉墓中保存最完好、出土文物最丰富的一座，为研究西汉初期的历史、文化、艺术及科技提供了极其珍贵的实物资料。\n【例证】墓葬为带斜坡墓道的竖穴土坑木椁墓，椁室四周填塞木炭与白膏泥，形成绝佳密封环境。墓中出土了保存完好的辛追女尸，以及素纱襌衣、T型帛画、精美漆器和《遣策》竹简等万余件文物。特别是T型帛画生动反映了汉代的宇宙观与升仙思想，素纱襌衣展现了极高的纺织工艺。\n【评价】马王堆一号汉墓的发现是中国20世纪重大考古发现之一。其完好的密封技术造就了千年不腐的女尸，打破了防腐技术的认知；大量丝织品和漆器的出土，填补了汉代物质文化史的空白；竹简帛书的发现极大推动了简帛学研究，具有极高的历史、科学与艺术价值。", "keywords": "关键字：二、答题关键字速背\n关键字：长沙国丞相利苍之妻、竖穴土坑木椁墓、白膏泥与木炭密封、辛追女尸、素纱襌衣、T型帛画、遣策、简帛学、汉代物质文化", "short_answer": "三、150字速答\n马王堆一号汉墓位于湖南长沙，为西汉初长沙国丞相利苍之妻辛追墓。该墓为竖穴土坑木椁墓，以白膏泥和木炭密封，出土了千年不腐的女尸及万余件珍贵文物。其中素纱襌衣、T型帛画、漆器及《遣策》竹简等，全面展现了西汉初期的纺织、绘画工艺及丧葬观念。该墓是二十世纪中国重大考古发现，对研究汉代物质文化具有里程碑意义。"}, {"id": 40, "year": 2018, "direction": "田野考古方向", "type": "名词解释", "number": 14, "text": "辽上京", "score": null, "status": "ok", "source_note": "", "tags": ["考古学"], "question_id": 40, "model": "deepseek-v4-pro", "full_answer": "一、北大答题范式（300-600字）\n【定义】\n辽上京是辽朝兴建的首座都城，也是辽代五京中地位最重要的京城，位于今内蒙古自治区巴林左旗林东镇南。作为契丹族在草原地带构建的政治、军事与文化中心，辽上京始建于辽太祖神册三年（918年），其规划与营建深刻体现了辽朝“以国制治契丹，以汉制待汉人”的二元统治体制，是中国古代北方游牧政权都城制度的杰出范例，1961年被列为全国第一批重点文物保护单位。\n【例证】\n辽上京遗址平面呈独特的“日”字形，由北部的皇城和南部的汉城构成，南北二城总面积约5平方公里。皇城为契丹贵族、官署与宫廷所在，城墙夯筑，四面辟门，加筑马面与瓮城，防御森严；城内已探明大型宫殿基址、东西向主干道路及密集的建筑群，宫城位于皇城中部偏东，建筑朝向多取东向，印证了契丹民族“东向拜日”的信仰习俗。南部的汉城主要为汉、渤海、回鹘等族居住，设有作坊、市肆与佛寺，城墙较为单薄，规划相对松散，适应商业与手工业活动的开展。2011年起，中国社会科学院考古研究所与内蒙古文物考古研究所联合对宫城进行持续发掘，揭露出东向宫门、大型宫殿夯土台基及庭院回廊等，出土大量琉璃瓦、陶瓷器、佛教造像和钱币等文物，实证了《辽史》记载的宫室制度。\n【评价】\n辽上京的二元城市形态是辽代“因俗而治”政策在都城层面的物化标志，突破了中原单一政治中心模式，对后世金上京、元上都的规划理念产生深远影响。它不仅是契丹从部落联盟迈向帝国体制的关键见证，也是丝绸之路上草原文明与农耕文明交融的重镇。作为文博研究的重要阵地，辽上京为探索10—12世纪东亚都城体系的多样性提供了不可替代的考古学样本，其文化遗产保护与阐释对理解中华民族多元一体格局具有重大意义。", "keywords": "关键字：二、答题关键字速背\n关键字：辽上京、神册三年（918年）、巴林左旗、日字形平面、皇城与汉城、二元布局、因俗而治、东向建筑、宫城考古、丝绸之路扩展遗产", "short_answer": "三、150字速答\n辽上京是辽朝第一座都城，位于今内蒙古巴林左旗，始建于918年。其平面呈“日”字形，分北皇城与南汉城，体现“因俗而治”的二元体制。皇城设宫城和官署，殿宇东向，契丹习俗浓厚；汉城为市肆作坊，安置其他民族。考古明确了宫城格局，出土大量建筑构件与生活用器。辽上京是辽代五京之首，对研究北方都城制度、民族融合与草原丝绸之路具有核心价值。"}, {"id": 40, "year": 2018, "direction": "田野考古方向", "type": "名词解释", "number": 14, "text": "辽上京", "score": null, "status": "ok", "source_note": "", "tags": ["考古学"], "question_id": 40, "model": "gemini-3.5-flash", "full_answer": "[API_ERROR] HTTPError: HTTP Error 429: Too Many Requests", "keywords": "", "short_answer": ""}, {"id": 40, "year": 2018, "direction": "田野考古方向", "type": "名词解释", "number": 14, "text": "辽上京", "score": null, "status": "ok", "source_note": "", "tags": ["考古学"], "question_id": 40, "model": "qwen3.7-max", "full_answer": "一、北大答题范式（300-600字）\n【定义】\n辽上京是辽朝建立的第一座都城，也是辽代五京之首，位于今内蒙古自治区巴林左旗。由辽太祖耶律阿保机于神册三年（918年）始建，初名皇都，后改称上京。其城市布局深刻体现了契丹民族“因俗而治”的政治理念与游牧、农耕文化交融的时代特征。\n【例证】\n上京城首创“北皇南汉”的双城制布局。皇城在北，是契丹贵族居住和理政的核心区，内有宫殿与寺庙，且特意保留大片空地供搭建毡帐，延续游牧传统；汉城在南，是汉人、渤海人等从事工商业和农业的区域，街道与坊市布局仿照中原城市。这种独特的空间规划，正是辽代“以国制治契丹，以汉制待汉人”这一“一国两制”政策在都城建设上的直接物化。\n【评价】\n辽上京不仅是辽代的政治、经济和文化中心，更是中国古代都城发展史上的重要节点。它打破了中原传统都城中轴对称的单一模式，开创了游牧与农耕文化相结合的都城规划新范式，对后来的金中都、元大都等北方民族政权的都城建设产生了深远影响，具有极高的历史、考古与文化遗产价值。", "keywords": "关键字：二、答题关键字速背\n关键字：辽代五京之首、耶律阿保机、皇都、双城制、北皇南汉、因俗而治、游牧与农耕交融、巴林左旗", "short_answer": "三、150字速答\n辽上京位于今内蒙古巴林左旗，是辽太祖耶律阿保机建立的第一座都城，为辽代五京之首。其首创“北皇南汉”的双城制布局：北为皇城，供契丹贵族理政居住，保留游牧毡帐区；南为汉城，供汉人等从事农商，仿中原建制。这种规划是辽朝“因俗而治”国策的空间物化，开创了游牧与农耕文化交融的都城新范式，对后世金元都城影响深远。"}, {"id": 41, "year": 2018, "direction": "田野考古方向", "type": "名词解释", "number": 15, "text": "金中都", "score": null, "status": "ok", "source_note": "", "tags": ["考古学"], "question_id": 41, "model": "deepseek-v4-pro", "full_answer": "一、北大答题范式（300-600字）\n【定义】\n金中都是金朝的都城，位于今北京西南部（原宣武区一带），是金代政治、经济、文化中心。金朝海陵王完颜亮于贞元元年（1153年）自上京会宁府迁都至此，改燕京为中都，仿北宋汴京规制进行了大规模营建，标志着北京正式成为一代王朝的首都。其城市布局遵循《考工记》营国制度，外城略呈方形，东、西、南三面各开三门，北面四门，共十三门，城内中轴线贯穿皇城与宫城，里坊制与开放式街巷并存，对后世都城规划影响深远。\n【例证】\n考古发现的金中都遗迹包括水关遗址、宫殿基址、大安殿遗址等。1990年发掘的金中都水关遗址位于右安门外，是城内水系穿城墙而过的水利设施，其木石结构完整，反映了当时高超的工程技术。宫城位于城中央偏南，大安殿作为主殿，其台基规模宏大，出土有黄琉璃瓦等建筑构件，证实了文献中“宫阙壮丽”的记载。此外，中都城西南有金人扩建的莲花池水系，是城市水源命脉；城东北的北海琼华岛则属金代离宫大宁宫的遗存。城市里坊以坊墙分隔，但商业已突破坊市界限，出现繁荣街市，如檀州街等，体现了唐宋都城向开放式街道过渡的特点。\n【评价】\n金中都是北京由地域重镇走向全国政治中心的关键转折点，上承唐幽州、辽南京，下启元大都，在城市发展史上具有里程碑意义。其吸收宋汴京规划，融合北方少数民族地域特色，确立了中轴对称、宫城居中的范式，为元大都“前朝后市、左祖右社”的格局奠定了基础。同时，金中都作为多民族国家的京城，促进了女真、汉、契丹等族文化的交融，在陶瓷、建筑、佛教艺术等领域留下丰富遗产。尽管后来被蒙古铁骑摧毁，但其空间格局与故宫、北海等遗存至今仍可追溯，是研究古代都城制度变迁的典型标本。", "keywords": "关键字：二、答题关键字速背\n关键字：金朝都城、海陵王迁都、1153年、仿汴京、方形外城十三门、宫城居中、水关遗址、大安殿、莲花池水系、大宁宫、里坊制向街巷过渡、北京建都之始、承前启后。", "short_answer": "三、150字速答\n金中都是金朝首都，1153年海陵王完颜亮迁都燕京并改称中都，仿照北宋汴京营建，城址在今北京西南。平面呈方形，设十三门，宫城位于中央，布局规整，体现中轴对称。考古发现水关遗址、大安殿基址等重要遗存，佐证其“宫阙壮丽”的记载。金中都是北京作为都城的开端，上承辽南京，下启元大都，在城市规划史上占据转折地位，其里坊与街巷并存的面貌反映了唐末至宋元都城变革的过渡特征。"}, {"id": 41, "year": 2018, "direction": "田野考古方向", "type": "名词解释", "number": 15, "text": "金中都", "score": null, "status": "ok", "source_note": "", "tags": ["考古学"], "question_id": 41, "model": "gemini-3.5-flash", "full_answer": "[API_ERROR] HTTPError: HTTP Error 429: Too Many Requests", "keywords": "", "short_answer": ""}, {"id": 41, "year": 2018, "direction": "田野考古方向", "type": "名词解释", "number": 15, "text": "金中都", "score": null, "status": "ok", "source_note": "", "tags": ["考古学"], "question_id": 41, "model": "qwen3.7-max", "full_answer": "一、北大答题范式（300-600字）\n【定义】金中都是金朝中后期的都城，位于今北京市西南部。贞元元年（1153年），海陵王完颜亮将都城从上京迁至燕京，改称中都。它是在辽南京城的基础上，仿照北宋汴梁城的规制扩建而成，标志着北京首次成为全国性政权的首都。\n【例证】金中都分为外城、皇城和宫城三重城垣。考古发掘证实了其城市布局，如丰台区发现的金中都水关遗址，展现了当时高超的水利工程技术；西城区发现的宫殿区遗址，出土了龙纹瓦当、琉璃脊兽等精美建筑构件，反映了皇家建筑的宏伟。此外，中都城内的坊市布局也体现了从封闭式向开放式街巷过渡的特征。\n【评价】金中都在北京城市发展史和中国古代都城史上具有承前启后的里程碑意义。它不仅奠定了北京作为全国政治中心的历史地位，其规划也深刻影响了元大都及明清北京城。同时，金中都的营建促进了民族融合与经济文化交流，是研究金代历史与都城考古的核心实物资料。", "keywords": "关键字：二、答题关键字速背\n关键字：海陵王完颜亮、1153年迁都、辽南京扩建、仿北宋汴梁、三重城垣、水关遗址、宫殿遗址、北京建都之始、承前启后、民族融合", "short_answer": "三、150字速答\n金中都是金朝都城，1153年海陵王完颜亮迁都燕京并扩建而成。城址位于今北京西南部，分宫城、皇城、外城三重，仿北宋汴梁规制。考古发现的水关与宫殿遗址印证了其宏伟布局。金中都是北京首次成为全国性首都的标志，奠定了北京作为全国政治中心的历史地位，对后世都城规划影响深远，具有里程碑意义。"}, {"id": 42, "year": 2018, "direction": "田野考古方向", "type": "简答题", "number": 1, "text": "请简述田野考古室内整理考古资料的整理方法", "score": null, "status": "ok", "source_note": "", "tags": ["考古学"], "question_id": 42, "model": "deepseek-v4-pro", "full_answer": "一、北大答题范式（300-600字）\n【定义】\n田野考古室内整理，是指在田野发掘工作结束后，将所获取的各类实物遗存和信息资料，在室内环境下进行系统化、标准化的清洗、拼对、修复、分类、登记、绘图、摄影、拓片、分析及报告编写等一系列工作的总称。它是田野考古工作不可分割的后续环节，是将田野发掘所获的原始、零散、带有污损的考古资料，转化为可供研究和展示的科学信息的关键过程。其核心目标在于最大限度地提取遗存的历史、艺术与科学价值，确保资料的完整性与可追溯性。  \n【例证】\n以一处史前聚落遗址的室内整理为例。首先，对出土陶片进行清洗去泥，自然阴干，按陶质、陶色、纹饰初步分选，随即开展拼对与修复，以复原器形。每件标本均赋予唯一编号，进行规范化描述并录入数据库。典型器物需绘制多面正投影线图，纹饰复杂者施以拓片，重要标本进行多角度高清摄影。其次，对灰坑、房址等遗迹单位中获取的炭化植物种子、动物骨骼等自然遗存，进行浮选、鉴定与量化统计，以重建古环境与生业模式。所有发掘日记、图纸、影像等原始记录需数字化归档，并与实物资料交叉核对，确保地层学与类型学逻辑的一致性。最终，在综合所有信息的基础上，编写考古报告，以文字、线图、图版等形式，系统公布发掘资料，并附以初步分期、分区与文化因素分析。  \n【评价】\n室内整理并非单纯的“后期处理”，而是考古学研究由感性认知迈向理性分析、由特殊现象归纳普遍规律的核心转化阶段。其整理质量直接决定遗址研究深度与报告学术价值。严密的整理程序，能纠正田野中的误判，发现新的学术线索，如细微的使用痕迹或原始的制造工艺。当下，多学科介入与数字化技术（如三维建模、GIS空间分析）的整合，极大拓展了整理的维度，使考古资料阐释从器物描述走向对古代社会行为与认知的深入复原，是践行“透彻见人”理念的方法论基石。", "keywords": "关键字：二、答题关键字速背\n关键字：清洗拼对、标准化登记、类型学分类、多学科采样、数字化归档、考古报告编写、资料完整性", "short_answer": "三、150字速答\n田野考古室内整理是将田野发掘获取的实物与信息资料系统转化为科学档案的核心环节。工作始于清洗、拼对与修复，随后进行统一编号、标准化描述与分类登记。核心在于运用类型学方法绘图、拓片、摄影，全面提取遗存信息并数字化归档。同时，需对自然遗存进行科学鉴定与统计。最终，以地层单位与遗迹单位为纲，撰写考古报告，通过图文系统刊布资料，为后续研究提供扎实、可回溯的学术基础。"}, {"id": 42, "year": 2018, "direction": "田野考古方向", "type": "简答题", "number": 1, "text": "请简述田野考古室内整理考古资料的整理方法", "score": null, "status": "ok", "source_note": "", "tags": ["考古学"], "question_id": 42, "model": "gemini-3.5-flash", "full_answer": "[API_ERROR] HTTPError: HTTP Error 429: Too Many Requests", "keywords": "", "short_answer": ""}, {"id": 42, "year": 2018, "direction": "田野考古方向", "type": "简答题", "number": 1, "text": "请简述田野考古室内整理考古资料的整理方法", "score": null, "status": "ok", "source_note": "", "tags": ["考古学"], "question_id": 42, "model": "qwen3.7-max", "full_answer": "一、北大答题范式（300-600字）\n【定义】田野考古室内整理是指将田野发掘获取的实物及图文资料，在室内进行系统化处理与初步研究的过程。核心方法包括：1.物理处理：清洗、拼对、粘接与修复；2.信息管理：统一编号、登记与建档；3.资料提取：绘制线图、照相、拓片及三维扫描；4.分类排队：运用类型学进行器物分类与年代排序；5.科技采样：提取测年、残留物等检测样本。\n【例证】以二里头遗址陶器整理为例，首先对出土陶片进行清洗与拼对粘接，恢复器物原貌；随后进行统一编号与登记入库；接着绘制器物线图并拍摄高清照片；最后运用考古类型学对陶鬲、陶爵等进行型式划分与排队，建立年代序列，并提取陶器内壁残留物进行微体化石分析。\n【评价】室内整理是田野发掘向科学研究转化的关键枢纽。科学的整理方法不仅能最大程度保护文物信息，还能为后续的年代学、聚落形态等深入研究奠定坚实的数据基础，是考古学规范化与科学化的重要体现。", "keywords": "关键字：二、答题关键字速背\n关键字：清洗拼对、编号登记、绘图照相、分类排队、科技采样、类型学分析、建立档案", "short_answer": "三、150字速答\n田野考古室内整理是发掘向研究转化的关键。方法包括：首先对出土遗物进行清洗、拼对、粘接与修复；其次进行统一编号、登记建档，并开展绘图、照相和拓片等资料提取工作；再次运用考古类型学对遗物进行分类与排队，建立年代序列；最后提取科技检测样本。科学整理为后续深入研究奠定了坚实的数据基础。"}, {"id": 43, "year": 2018, "direction": "田野考古方向", "type": "简答题", "number": 2, "text": "请简述如何测绘大型遗址", "score": null, "status": "ok", "source_note": "", "tags": ["考古学"], "question_id": 43, "model": "deepseek-v4-pro", "full_answer": "一、北大答题范式（300-600字）\n【定义】\n大型遗址测绘是针对面积广大、遗迹复杂、具有重要考古价值的遗址，运用现代测量技术进行全面、系统、高精度的空间数据采集、记录与表达的过程。它不仅是技术操作，更是将遗址的空间形态、地层关系、遗存分布转化为可永久存档和深入研究的科学图档系统。其核心在于建立遗址的统一空间基准，实现多尺度、多维度信息的有机整合，为考古发掘、遗产保护、复原展示提供基础支撑。\n\n【例证】\n以良渚古城遗址测绘为例，首先需建立覆盖整个遗址及其周边环境的GPS控制网，作为统一坐标系的基础。然后采用无人机低空摄影测量获取高分辨率正射影像和数字表面模型，实现对城墙、宫殿区、外围水利系统等宏观结构的整体认知。针对莫角山宫殿基址、反山王陵等关键区域，实施三维激光扫描，以毫米级精度记录遗迹的细微起伏和重要出土器物的原位状态。同时，运用RTK接收机对考古发掘探方、地层剖面、遗迹单位进行实时动态定位，将考古信息与空间坐标精确绑定。最终，所有数据汇入地理信息系统（GIS），形成包含影像、地形、探方、遗迹、遗物等多层信息的遗址总图，实现任意剖面绘制、土方计算、可视域分析，使大型遗址的复杂景观和考古内涵得以数字化呈现。\n\n【评价】\n大型遗址测绘已从辅助记录手段跃升为考古学研究与遗产管理的基础性工程。它不仅解决了传统测绘在大尺度、高精度上的局限，更催生了“空间考古”的研究范式，使得聚落形态分析、景观考古、三维地层关系推演成为可能。然而，过度依赖高端设备可能忽略对遗址本体特征的针对性设计，海量数据的存储、共享与长期可用性也构成挑战。理想的测绘应技术理性与考古问题意识并重，在统一的时空框架下，让数据真正服务于遗址的历史解读和当代保护。", "keywords": "关键字：二、答题关键字速背\n关键字：统一空间基准、控制测量、无人机摄影测量、三维激光扫描、RTK动态定位、地理信息系统(GIS)、多源数据融合、数字正射影像、数字高程模型、空间考古", "short_answer": "三、150字速答\n测绘大型遗址，须先建立覆盖全区的GPS控制网，确立统一坐标基准。综合运用无人机航空摄影获取整体地貌影像，生成数字正射影像与地表模型；对重点遗存实施三维激光扫描，记录精密形态。配合RTK实时定位，将考古探方、遗迹空间坐标精确绑定。最终在GIS平台整合多源数据，构建包含地形、影像、遗存分布的综合性空间数据库，实现遗址的数字化管理与多尺度分析。"}, {"id": 43, "year": 2018, "direction": "田野考古方向", "type": "简答题", "number": 2, "text": "请简述如何测绘大型遗址", "score": null, "status": "ok", "source_note": "", "tags": ["考古学"], "question_id": 43, "model": "gemini-3.5-flash", "full_answer": "[API_ERROR] HTTPError: HTTP Error 429: Too Many Requests", "keywords": "", "short_answer": ""}, {"id": 43, "year": 2018, "direction": "田野考古方向", "type": "简答题", "number": 2, "text": "请简述如何测绘大型遗址", "score": null, "status": "ok", "source_note": "", "tags": ["考古学"], "question_id": 43, "model": "qwen3.7-max", "full_answer": "一、北大答题范式（300-600字）\n【定义】大型遗址测绘是指运用传统测量仪器与现代空间信息技术，对面积广阔、内涵复杂的大型考古遗址进行空间数据采集、处理、分析与成果表达的系统性工作，旨在为遗址保护、研究、展示与管理提供精准的空间基底。\n【例证】以良渚古城遗址测绘为例。首先，利用无人机倾斜摄影与机载激光雷达（LiDAR）获取遗址宏观地形与植被下微地貌；其次，结合RTK与全站仪进行关键遗迹节点的精确控制测量；再次，运用三维激光扫描对重点发掘区进行高精度三维建模；最后，将多源异构数据统一导入GIS平台，建立遗址空间数据库，生成正射影像图、数字高程模型（DEM）及三维系统，实现数字化存档。\n【评价】大型遗址测绘体现了考古学从传统“手工绘图”向“数字化、智能化”的范式转变。它不仅极大提高了数据采集的效率与精度，解决了大型遗址“测不全”的难题，更为遗址的整体保护规划、虚拟复原展示及多学科综合研究提供了不可或缺的数字基础设施，是新时代文物预防性保护的核心技术支撑。", "keywords": "关键字：二、答题关键字速背\n关键字：空天地一体化、无人机倾斜摄影、激光雷达（LiDAR）、RTK控制测量、三维激光扫描、GIS空间数据库、数字高程模型（DEM）、多源异构数据、数字化存档、预防性保护", "short_answer": "三、150字速答\n大型遗址测绘需构建“空天地”一体化技术体系。宏观上，利用无人机倾斜摄影与机载激光雷达获取全域地形与微地貌；微观上，结合RTK与三维激光扫描对重点遗迹进行高精度三维建模。最终将多源数据汇入GIS平台，建立遗址空间数据库，生成正射影像与数字高程模型。此举实现了遗址精准数字化存档，为保护规划与展示提供数据支撑。"}, {"id": 44, "year": 2018, "direction": "田野考古方向", "type": "论述题", "number": 1, "text": "论述近十年来关于中国文明的探源研究", "score": null, "status": "ok", "source_note": "", "tags": ["考古学"], "question_id": 44, "model": "deepseek-v4-pro", "full_answer": "一、北大答题范式（300-600字）\n【定义】\n近十年来中国文明探源研究，是指自2010年代以来，以“中华文明探源工程”第四、五阶段为核心，结合多学科联合攻关，对距今5500-3500年间中国各地区文明化进程的起源、形成与早期发展进行系统阐释的学术实践。其核心在于突破传统“中原中心论”单一叙事，构建“多元一体”的文明起源模式，并探讨文明、国家等概念的中国标准。研究的定义性特征包括：重视核心遗址的持续发掘与精细测年，强调多学科（植物考古、动物考古、DNA、同位素、古环境等）整合，聚焦社会复杂化与政治实体的演进，并以世界文明比较视野寻求中华文明的独特性。\n\n【例证】\n典型例证有三。一是浙江良渚遗址群的研究深化，确证了距今5300-4300年前以大型水利系统、瑶山与反山王陵、玉琮神徽为标志的区域性早期国家形态，实证了“东亚最早的成熟文明”。二是陕西石峁遗址的发现，揭示出一座距今4300-3800年的巨型石城，其皇城台、内外城结构及大量人祭遗存，改写了河套地区文明化路径，呈现了多方交互的“古国”形态。三是山西襄汾陶寺遗址的持续调查，通过观象台、宫城、朱书文字扁壶等，证实了距今4300-3900年晋南地区的都邑性聚落，成为“最初中国”的重要候选地。此外，河南二里头、甘肃南佐、山东焦家等遗址均提供了中心聚落的规模化、礼制化证据，共同勾勒出“古国-王国-帝国”的演进链条。\n\n【评价】\n近十年的探源研究取得了范式性突破。首先，方法上实现了从编年建构到社会重建的转型，科技考古的深度介入使得生产、贸易、族群、信仰等文明要素变得可实证。其次，理论层面，“区系类型”“重瓣花朵”等中国学派理论得到更新，提出了“文明三要素”（冶金、文字、城市）不适用于中国，而是以“农业发达、等级分化、礼制初成、权力神授”等作为文明形成的关键标准。然仍存在局限：过度聚焦中心都邑而轻视广域控制体系的微观研究；文明标志的多元标准可能导致泛文明化；东西部不平衡阐释尚未完全打破；公众传播中仍易陷入“最早”“最大”的线性攀比。未来需强化社会底层与跨区域互动网络的系统性阐释，并构建更具全球对话性的文明理论。", "keywords": "关键字：二、答题关键字速背\n关键字：多元一体、中华文明探源工程、良渚、石峁、陶寺、多学科整合、科技考古、古国-王国-帝国、文明标准中国方案、区域互动模式", "short_answer": "三、150字速答\n近十年中国文明探源研究以“探源工程”为核心，突破“中原中心论”，通过良渚、石峁、陶寺等核心遗址的系统发掘与多学科整合，构建了距今五千多年文明形成的多元一体图景。研究提出符合中国实情的文明标准，如农业经济、等级分化与礼制出现，实证了中国具有五千多年文明史，并勾勒出从“古国”到“王国”的演进轨迹，标志着中国文明研究从编年框架走向社会复杂化阐释的成熟阶段。"}, {"id": 44, "year": 2018, "direction": "田野考古方向", "type": "论述题", "number": 1, "text": "论述近十年来关于中国文明的探源研究", "score": null, "status": "ok", "source_note": "", "tags": ["考古学"], "question_id": 44, "model": "gemini-3.5-flash", "full_answer": "[API_ERROR] HTTPError: HTTP Error 429: Too Many Requests", "keywords": "", "short_answer": ""}, {"id": 44, "year": 2018, "direction": "田野考古方向", "type": "论述题", "number": 1, "text": "论述近十年来关于中国文明的探源研究", "score": null, "status": "ok", "source_note": "", "tags": ["考古学"], "question_id": 44, "model": "qwen3.7-max", "full_answer": "一、北大答题范式（300-600字）\n【定义】中华文明探源工程是国家级重大科研项目，近十年来以“多元一体”为核心，运用多学科交叉手段，实证了中华五千年文明史，揭示了中华文明的起源、形成与早期发展过程及其特质。\n【例证】近十年研究在良渚、石峁、陶寺、二里头等都邑性遗址取得突破。良渚古城及水利系统实证了距今5000年已进入文明社会；石峁遗址揭示了北方地区早期国家的复杂社会结构；二里头遗址明确了夏代中晚期广域王权国家的都城形态。同时，科技考古的深度介入，精准构建了年代框架与生业模式。\n【评价】近十年的探源研究打破了西方“文明三要素”标准，提出了判断进入文明社会的“中国方案”，从理论和实证层面夯实了文化自信。其多学科交融的范式代表了中国考古学的前沿水平，但在文明演进动力机制及中外文明比较方面仍有深化空间。", "keywords": "关键字：二、答题关键字速背\n关键字：中华文明探源工程、多元一体、良渚遗址、石峁遗址、二里头遗址、科技考古、中国方案、文明标准、广域王权国家、文化自信", "short_answer": "三、150字速答\n近十年来，中华文明探源工程以“多元一体”为核心，依托良渚、石峁、二里头等都邑遗址，结合科技考古手段，实证了中华五千年文明史。研究打破了西方“文明三要素”标准，提出了判断文明社会的“中国方案”，揭示了早期国家的演进脉络，从理论与实证层面夯实了文化自信，代表了中国考古学的前沿水平。"}, {"id": 45, "year": 2018, "direction": "田野考古方向", "type": "论述题", "number": 2, "text": "请论述唐宋瓷业的差异和原因", "score": null, "status": "ok", "source_note": "", "tags": ["考古学"], "question_id": 45, "model": "deepseek-v4-pro", "full_answer": "一、北大答题范式（300-600字）\n【定义】\n唐宋瓷业的差异，本质上是瓷器生产从“南青北白”的地域性工艺分野，向以官窑为核心的全国性窑系格局转变的过程。唐代瓷业以越窑青瓷和邢窑白瓷为代表，形成了二元并立的产业版图，胎质追求仿玉的“类冰类雪”效果，装饰技法以刻划花和素面为主。而宋代瓷业则呈现出百花齐放的窑系格局，汝、官、哥、钧、定五大名窑确立了审美典范，民窑如磁州窑、耀州窑、龙泉窑、景德镇窑等亦根据市场分工蓬勃发展，胎釉配方与窑炉技术取得突破性进步。\n【例证】\n产业地理方面，唐代窑址主要集中在浙江越窑和河北邢窑，呈现点状分布，产品多依赖水运供宫廷与文人阶层。至宋代，窑口数量急剧增加，形成了八大窑系，其生产中心从单纯供给上层转向多层次市场。例如，北方的磁州窑以白地黑花技法满足市井民众生活需求，景德镇窑创烧青白瓷远销海外。技术上，唐代采用馒头窑或龙窑烧制，温度与气氛控制相对单一；宋代则广泛应用覆烧法提升产量，并通过窑变、开片等对缺陷的审美化处理，创造出钧窑的灿若晚霞、哥窑的金丝铁线等独特美学。文化上，唐代瓷器以“如玉”为最高追求，体现文人化的清高理想；宋代瓷器则以“釉色”为审美核心，追求自然天成的“天青”“粉青”等色泽，这与宋代理学格物致知、内省沉静的时代精神深度契合。\n【评价】\n唐宋瓷业差异源于经济基础变革与文化生活圈的位移。唐后期经济重心逐渐南移，宋时江南成为财富与人口枢纽，为南方瓷业崛起提供了资源与市场。科举制的完善与士人阶层的壮大，使得瓷器审美从唐代的贵族豪放风格转向宋代的士大夫清雅趣味。海上丝绸之路的繁荣促使瓷器作为核心外销商品，刺激了规模化、标准化生产技术的革新。这种从特定地域的精英化生产到面向全域的分工化市场的转变，是中国瓷器手工业从成熟走向鼎盛的重要转型。", "keywords": "关键字：二、答题关键字速背\n关键字：南青北白、窑系、官窑系统、经济重心南移、覆烧法、釉色美学、士人审美、海上贸易、胎釉配方、格物致知", "short_answer": "三、150字速答\n唐宋瓷业差异体现在产业格局、技术与审美三方面。唐代是“南青北白”的地域点状生产，重玉质感；宋代则是多窑系分工并立，官民窑争辉。原因在于宋代经济重心南移提供产业动力，士人阶层崛起主导清雅釉色审美，海上贸易勃兴拉动了规模化生产与技术革新，使瓷业从文人贵族的专属物转向面向多元市场的繁荣手工业。"}, {"id": 45, "year": 2018, "direction": "田野考古方向", "type": "论述题", "number": 2, "text": "请论述唐宋瓷业的差异和原因", "score": null, "status": "ok", "source_note": "", "tags": ["考古学"], "question_id": 45, "model": "gemini-3.5-flash", "full_answer": "[API_ERROR] HTTPError: HTTP Error 429: Too Many Requests", "keywords": "", "short_answer": ""}, {"id": 45, "year": 2018, "direction": "田野考古方向", "type": "论述题", "number": 2, "text": "请论述唐宋瓷业的差异和原因", "score": null, "status": "ok", "source_note": "", "tags": ["考古学"], "question_id": 45, "model": "qwen3.7-max", "full_answer": "一、北大答题范式（300-600字）\n【定义】唐宋瓷业是中国陶瓷史上的两大高峰，但在生产格局、工艺特征、审美取向及外销规模上存在显著差异。唐代呈现“南青北白”格局，宋代则形成“六大窑系”与官民并举的繁荣局面。\n【例证】差异方面：唐代以越窑青瓷和邢窑白瓷为代表，器型丰满厚重；宋代窑口林立，如五大名窑及龙泉、建窑等，器型挺拔秀丽，釉色追求玉质感，覆烧等工艺成熟。原因方面：唐代经济重心开始南移，社会风气开放包容；宋代经济重心彻底南移，商品经济高度发达，市民阶层崛起，理学思想影响审美，加之海上丝绸之路空前繁荣，刺激了瓷业的技术革新与规模化外销。\n【评价】唐宋瓷业的演变不仅是制瓷技术的进步，更是中国古代经济重心南移、社会阶层结构变迁及中外文化交流的深刻缩影，奠定了中国瓷器在世界物质文化史上的核心地位。", "keywords": "关键字：二、答题关键字速背\n关键字：南青北白、六大窑系、五大名窑、经济重心南移、商品经济、市民阶层、理学审美、海上丝绸之路、覆烧工艺、玉质感", "short_answer": "三、150字速答\n唐宋瓷业差异显著。唐代呈“南青北白”格局，器型丰满；宋代形成“六大窑系”与五大名窑，追求玉质感与秀丽器型。其原因在于：宋代经济重心彻底南移，商品经济与海外贸易空前繁荣，刺激了技术革新与外销；同时，市民阶层崛起与理学思想盛行，促使宋代瓷器审美向内敛、素雅转变，奠定了中国瓷业的巅峰地位。"}];

    const models=[...new Set(DATA.filter(d=>d.model).map(d=>d.model))].sort();
    document.getElementById('filterYear').innerHTML+='<option value="">全部年份</option>'+years.map(y=>'<option value="'+y+'">'+y+'年</option>').join('');
    document.getElementById('filterType').innerHTML+='<option value="">全部题型</option>'+types.map(t=>'<option value="'+t+'">'+t+'</option>').join('');

    document.getElementById('filterModel').innerHTML+='<option value="all">全部模型</option>'+models.map(m=>'<option value="'+m+'\">'+m+'</option>').join('');

// ── 记号笔三色 ──
function setHLColor(color){
    hlColor=color;
    // 切换颜色时更新按钮状态
    document.querySelectorAll('.hl-toolbar button').forEach(b=>b.style.outline='');
    const active=document.querySelector('.hl-toolbar .c-'+color);
    if(active) active.style.outline='2px solid #333';
}

// 橡皮擦模式
let eraserMode = false;
function toggleEraser(){
    eraserMode=!eraserMode;
    document.getElementById('eraserBtn').classList.toggle('active',eraserMode);
}

function doHighlight(){
    const sel=window.getSelection();
    if(!sel||sel.isCollapsed||!sel.rangeCount) return;
    const range=sel.getRangeAt(0);
    const text=sel.toString().trim();
    if(!text) return;
    
    const panel=range.commonAncestorContainer.nodeType===3?
        range.commonAncestorContainer.parentElement?.closest('.model-panel'):
        range.commonAncestorContainer.closest('.model-panel');
    if(!panel) return;
    
    const key=text.slice(0,40)+'@'+Math.random().toString(36).slice(2,8);
    let cls='hl'; if(hlColor==='green') cls+=' grn'; if(hlColor==='pink') cls+=' pnk';
    
    const span=document.createElement('span');
    span.className=cls; span.dataset.hlkey=key;
    span.onclick=function(e){e.stopPropagation();doHighlightClick(this);};
    
    try{
        range.surroundContents(span);
    }catch(e){
        // fallback: extract + insert
        const frag=range.extractContents();
        span.appendChild(frag);
        range.insertNode(span);
    }
    sel.removeAllRanges();
    
    hlData.push({key,color:hlColor,text,cardId:panel.closest('.card')?.id||'',date:new Date().toISOString().substring(0,10)});
    localStorage.setItem('pku_hl2',JSON.stringify(hlData));
}

// 点击已高亮文字 → 擦除
function doHighlightClick(el){
    let key=el.dataset.hlkey||'';
    let idx=hlData.findIndex(h=>h.key===key);
    if(idx>=0) hlData.splice(idx,1);
    const parent=el.parentNode;
    while(el.firstChild) parent.insertBefore(el.firstChild, el);
    parent.removeChild(el);
    parent.normalize();
    localStorage.setItem('pku_hl2',JSON.stringify(hlData));
}

function toggleHLVisible(){
    hlVisible=!hlVisible;
    document.getElementById('hlToggle').classList.toggle('active',hlVisible);
    document.querySelectorAll('.hl').forEach(el=>el.classList.toggle('hide',!hlVisible));
}

function showHLHistory(mode){
    const date=document.getElementById('hlDate').value||new Date().toISOString().substring(0,10);
    const panel=document.getElementById('hlHistoryPanel');
    if(panel.style.display!=='none'){panel.style.display='none';return;}
    panel.style.display='block';
    let records=hlData;
    if(mode==='day') records=hlData.filter(h=>h.date===date);
    else if(mode==='cum') records=hlData.filter(h=>h.date<=date);
    let h='<h3>📋 记号笔 ('+(mode==='day'?'当日 '+date:'累计至 '+date)+')</h3>';
    let byDate={};records.forEach(r=>{if(!byDate[r.date])byDate[r.date]=[];byDate[r.date].push(r);});
    let dates=Object.keys(byDate).sort().reverse();
    if(!dates.length){h+='<p>无记录</p>';}
    else{dates.forEach(d=>{h+='<div style="font-size:12px;margin-bottom:6px"><b>📅 '+d+'</b> ('+byDate[d].length+'条)';byDate[d].forEach(r=>{let c=r.color==='green'?'🟢':r.color==='pink'?'💗':'🟡';h+='<div style="font-size:10px;margin:1px 0;padding:2px 4px;background:#f9f9f9;border-radius:2px">'+c+' '+r.text.substring(0,50)+'</div>';});h+='</div>';});}
    h+='<div style="margin-top:6px"><button onclick="document.getElementById(\'hlHistoryPanel\').style.display=\'none\'" style="padding:3px 10px;border:1px solid #8b0000;background:#fff;color:#8b0000;border-radius:4px;cursor:pointer;font-size:10px">关闭</button></div>';
    panel.innerHTML=h;
}

function applyHighlights(){
    // 从 hlData 恢复所有高亮到当前 DOM
    document.querySelectorAll('.card.open .model-panel .content.full').forEach(el=>{
        const cardId=el.closest('.card')?.id||'';
        const text=el.textContent;
        hlData.forEach(h=>{
            if(!h.text) return;
            // 检查这个标记是否属于当前卡片和面板
            if(h.cardId && h.cardId!==cardId) return;
            // 在文本中查找
            let idx=text.indexOf(h.text);
            if(idx<0) return; // 文本不在这个面板中
            // 用 innerHTML 替换（跳过已有 hl 标签）
            let escaped=h.text.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
            let re=new RegExp(escaped,'g');
            let replaced=false;
            el.innerHTML=el.innerHTML.replace(re,m=>{
                if(replaced) return m; // 只替换第一次
                replaced=true;
                let cls='hl'; if(h.color==='green') cls+=' grn'; if(h.color==='pink') cls+=' pnk';
                return '<span class="'+cls+'" data-hlkey="'+h.key+'" onclick="doHighlight(this,event)">'+m+'</span>';
            });
        });
    });
    // 应用隐藏状态
    document.querySelectorAll('.hl').forEach(el=>el.classList.toggle('hide',!hlVisible));
}

// ── 关键字在范式中标红 ──
function toggleKWInline(btn, mid){
    const el=document.getElementById(mid+'_full');
    if(!el) return;
    const kwEl=document.getElementById(mid+'_kw');
    if(!kwEl) return;
    const kwText=kwEl.textContent||'';
    // 提取关键字
    let kwMatch=kwText.match(/关键字[：:]\s*(.+)/);
    if(!kwMatch) return;
    let keywords=kwMatch[1].split(/[、,，]/).map(k=>k.trim()).filter(k=>k.length>=2);
    if(!keywords.length) return;
    
    if(el.querySelector('.kw-inline')){
        // 取消标红
        el.querySelectorAll('.kw-inline').forEach(s=>{s.outerHTML=s.textContent;});
        btn.classList.remove('active');
        btn.textContent='🔴';
    }else{
        // 标红
        let html=el.innerHTML;
        keywords.forEach(kw=>{
            let re=new RegExp(kw.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'g');
            html=html.replace(re,m=>'<span class="kw-inline">'+m+'</span>');
        });
        el.innerHTML=html;
        btn.classList.add('active');
        btn.textContent='⚫';
    }
}

// ── 模拟考 ──
let quizQuestions=[], currentQuizIdx=0, quizAnswers={};
function startQuiz(){
    const year=document.getElementById('quizYear').value;
    if(!year){alert('请选择年份');return;}
    const unique={}; DATA.filter(d=>d.text&&d.year==parseInt(year)).forEach(d=>{if(!unique[d.text])unique[d.text]=d;});
    quizQuestions=Object.values(unique);
    currentQuizIdx=0;quizAnswers={};
    showQuizQuestion();
}
function showQuizQuestion(){
    if(currentQuizIdx>=quizQuestions.length){finishQuiz();return;}
    const q=quizQuestions[currentQuizIdx];
    document.getElementById('quizArea').innerHTML=
        '<h3>第 '+(currentQuizIdx+1)+'/'+quizQuestions.length+' 题 ('+q.type+')</h3>'+
        '<p style="margin-bottom:6px;font-size:13px"><b>'+q.text+'</b></p>'+
        '<textarea id="quizAnswer" placeholder="请输入回答..."></textarea>'+
        '<button onclick="nextQuiz()" style="padding:6px 16px;background:#8b0000;color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:12px">提交并下一题</button>';
}
function nextQuiz(){
    const ans=document.getElementById('quizAnswer')?.value||'';
    if(ans.trim())quizAnswers[currentQuizIdx]=ans;
    currentQuizIdx++;
    showQuizQuestion();
}
async function finishQuiz(){
    document.getElementById('quizArea').innerHTML='<h3>正在批改...</h3>';
    let totalScore=0,results=[];
    for(let i=0;i<quizQuestions.length;i++){
        const q=quizQuestions[i];
        const answer=quizAnswers[i]||'（未作答）';
        const ref=q.full_answer||'';
        if(!ref||ref.length<50) continue;
        try{
            const resp=await fetch('https://api.deepseek.com/v1/chat/completions',{
                method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+DS_KEY},
                body:JSON.stringify({model:'deepseek-v4-pro',messages:[
                    {role:'system',content:'你是北大文博考研判卷老师。返回JSON：{"score":0-100,"feedback":"简短评价"}'},
                    {role:'user',content:'题目：'+q.text+'\n参考答案：'+ref.substring(0,600)+'\n学生回答：'+answer}
                ],max_tokens:300,temperature:0})});
            const r=await resp.json();
            let ct=r?.choices?.[0]?.message?.content||r?.choices?.[0]?.message?.reasoning_content||'{"score":0}';
            let m=ct.match(/\{[\s\S]*\}/); let ev=m?JSON.parse(m[0]):{score:0,feedback:ct.substring(0,80)};
            totalScore+=ev.score;
            results.push({qid:q.text,question:q.text,score:ev.score,feedback:ev.feedback,time:new Date().toISOString()});
        }catch(e){results.push({qid:q.text,question:q.text,score:0,feedback:'出错',time:new Date().toISOString()});}
    }
    let avg=results.length?Math.round(totalScore/results.length):0;
    results.forEach(r=>{if(!quizHistory[r.qid])quizHistory[r.qid]=[]; quizHistory[r.qid].push({date:r.time,score:r.score,answer:(quizAnswers[quizQuestions.findIndex(q=>q.text===r.question)]||'').substring(0,150),feedback:r.feedback});});
    localStorage.setItem('pku_quiz',JSON.stringify(quizHistory));
    updateWrongBadge();
    document.getElementById('quizArea').innerHTML=
        '<h3>模拟考完成</h3><div class="quiz-score">'+avg+' 分</div>'+
        (avg<80?'<p style="color:#c62828">⚠️ 低于80%，已入错题本</p>':'<p style="color:#4caf50">✅ 良好</p>')+
        '<button onclick="closeQuiz()" style="margin-top:6px;padding:6px 16px;background:#8b0000;color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:12px">关闭</button>';
}
function closeQuiz(){document.getElementById('quizPanel').style.display='none';render();}

// ── 错题本 ──
function toggleWrong(){
    const p=document.getElementById('wrongPanel');
    p.style.display=p.style.display==='none'?'block':'none';
    if(p.style.display!=='none') showWrongBook();
    updateWrongBadge();
}
function updateWrongBadge(){
    let c=0; for(let qid in quizHistory){let s=quizHistory[qid]; if(s[s.length-1]?.score<80) c++;}
    let b=document.getElementById('wrongBadge'); if(b) b.textContent=c;
    let w=document.getElementById('wrongCount'); if(w) w.textContent=c;
}
function showWrongBook(){
    let h='';
    for(let qid in quizHistory){
        let rs=quizHistory[qid], latest=rs[rs.length-1];
        if(latest.score>=80) continue;
        let trend=rs.length>1?rs[rs.length-1].score-rs[0].score:0;
        h+='<div class="wrong-item"><b>'+qid.substring(0,50)+'</b>'+
        '<div class="progress-bar"><div class="progress-fill" style="width:'+latest.score+'%"></div></div>'+
        '<p style="font-size:10px;color:#666">'+(latest.date||'').substring(0,10)+' | '+latest.score+'分 | '+
        (trend>0?'📈+'+trend:trend<0?'📉'+trend:'➡0')+' | 共考'+rs.length+'次</p>'+
        '<details style="font-size:10px;margin-top:3px"><summary>历史</summary>'+
        rs.map((r,i)=>'<div>'+(i+1)+'. '+(r.date||'').substring(0,10)+' '+r.score+'分 '+(r.feedback||'').substring(0,60)+'</div>').join('')+'</details></div>';
    }
    document.getElementById('wrongContent').innerHTML=h||'<p>暂无错题！</p>';
}

// ── 渲染 ──
function getQuestions(){
    const year=document.getElementById('filterYear').value;
    const type=document.getElementById('filterType').value;
    const tag=document.getElementById('filterTag').value;
    const model=document.getElementById('filterModel').value;
    const search=document.getElementById('filterSearch').value.toLowerCase();
    return DATA.filter(q=>{if(year&&String(q.year)!==year)return false;if(type&&q.type!==type)return false;if(tag&&!(q.tags||[]).includes(tag))return false;if(model!=='all'&&q.model!==model)return false;if(search&&!(q.text||'').toLowerCase().includes(search))return false;return !!q.text;});
}

function render(){
    const qs=getQuestions();const groups={};
    qs.forEach(q=>{const k=q.year+'-'+q.type+'-'+q.number+'-'+q.text;if(!groups[k])groups[k]={question:q,answers:[]};groups[k].answers.push(q);});
    document.getElementById('stats').textContent='共 '+Object.keys(groups).length+' 题（'+qs.length+' 条答案）';
    const list=document.getElementById('list');
    if(!Object.keys(groups).length){list.innerHTML='<div class="empty-state">无匹配题目</div>';return;}
    list.innerHTML=Object.values(groups).map((g,i)=>{const q=g.question;
        const tags=(q.tags||[]).map(t=>'<span class="badge badge-tag">'+t+'</span>').join('');
        const src=q.source_note?'<span class="badge badge-src">'+q.source_note+'</span>':'';
        const modelsHtml=g.answers.filter(a=>a.model).map(a=>{
            const kw=(a.keywords||'').replace(/^.*?关键字[：:]?\s*/s,'').replace(/二、答题关键字速背\s*/,'').trim();
            const sa=(a.short_answer||'').replace(/^.*?速答\s*/s,'').replace(/三、150字速答\s*/,'').replace(/^\n+/,'').trim();
            const mid='m'+i+'_'+a.model.replace(/[^a-z0-9]/gi,'');
            return '<div class="model-panel"><h4>🤖 '+a.model+'</h4>'+
            '<button class="kw-btn" onclick="toggleKWInline(this,\''+mid+'\')" title="关键字标红">🔴</button>'+
            '<div class="answer-tabs"><button class="active" onclick="switchTab(this,\'full\',\''+mid+'\')">📖 范式</button><button onclick="switchTab(this,\'kw\',\''+mid+'\')">🔑 关键字</button><button onclick="switchTab(this,\'short\',\''+mid+'\')">⚡ 速答</button></div>'+
            '<div class="content full" id="'+mid+'_full">'+escapeHtml(a.full_answer||'无')+'</div>'+
            '<div class="content keywords" id="'+mid+'_kw" style="display:none">'+escapeHtml(kw||'无')+'</div>'+
            '<div class="content short" id="'+mid+'_short" style="display:none">'+escapeHtml(sa||'无')+'</div></div>';
        }).join('');
        return '<div class="card" id="card'+i+'"><div class="card-header" onclick="toggleCard('+i+')"><div class="q-meta"><span class="badge badge-year">'+q.year+'</span><span class="badge badge-type">'+q.type+'</span>'+tags+' '+src+'</div><div class="q-text">'+(q.number||'')+'. '+escapeHtml(q.text||'')+'</div><span class="arrow">▼</span></div><div class="card-body"><div class="models">'+modelsHtml+'</div></div></div>';
    }).join('');
    setTimeout(()=>{applyHighlights();updateWrongBadge();},300);
}

function toggleCard(i){document.getElementById('card'+i).classList.toggle('open');}
function switchTab(btn,tab,prefix){btn.parentElement.querySelectorAll('button').forEach(b=>b.classList.remove('active'));btn.classList.add('active');['full','kw','short'].forEach(t=>{const el=document.getElementById(prefix+'_'+t);if(el)el.style.display=t===tab?'':'none';});}
function escapeHtml(s){const div=document.createElement('div');div.textContent=s;return div.innerHTML;}

function populateAnalysis(){
    const seen=new Map();DATA.forEach(d=>{if(!d.text)return;const t=d.text.toLowerCase().trim();seen.set(t,seen.get(t)||d.text);});
    const freq=new Map();DATA.forEach(d=>{if(!d.text)return;const t=d.text.toLowerCase().trim();if(!freq.has(t)){const yrs=[...new Set(DATA.filter(x=>x.text&&x.text.toLowerCase().trim()===t).map(x=>x.year))].sort((a,b)=>a-b);if(yrs.length>=2)freq.set(t,{text:seen.get(t),years:yrs,count:yrs.length});}});
    const sorted=[...freq.values()].sort((a,b)=>b.count-a.count);
    const tb=document.getElementById('freqTable'); sorted.forEach(f=>{tb.innerHTML+='<tr><td>'+f.text+'</td><td>'+f.years.join(', ')+'</td><td>'+f.count+'</td></tr>';});
    const tc={'考古学':['#d4edda','#155724'],'博物馆学':['#cce5ff','#004085'],'文化遗产':['#fff3cd','#856404'],'建筑史':['#f8d7da','#721c24'],'科技考古':['#e2d9f3','#442266']};
    const tcnt={};DATA.filter(d=>d.tags).forEach(d=>{(d.tags||[]).forEach(t=>{tcnt[t]=(tcnt[t]||0)+1;});});
    document.getElementById('tagCloud').innerHTML=Object.entries(tcnt).map(([t,c])=>'<span class="tag-item" style="background:'+(tc[t]||['#eee','#333'])[0]+';color:'+(tc[t]||['#eee','#333'])[1]+'">'+t+'（'+c+'题）</span>').join('');
    const yc={};DATA.filter(d=>d.text).forEach(d=>{yc[d.year]=(yc[d.year]||0)+1;});
    document.getElementById('yearSummary').textContent='题库覆盖 '+Object.keys(yc).length+' 年，共 '+Object.values(yc).reduce((a,b)=>a+b,0)+' 题次。DeepSeek V4 Pro / Qwen 3.7 Max / Gemini 3.5 Flash。';
}
init();

if('serviceWorker' in navigator){navigator.serviceWorker.register('/service-worker.js');}
